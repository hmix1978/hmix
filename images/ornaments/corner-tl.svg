<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Corner ornament - top left — rich European transom style -->

  <!-- === Triple L-frame === -->
  <!-- Outermost frame -->
  <path d="M0,3 L80,3" stroke="#9adfb4" stroke-width="1.0" fill="none" opacity="0.40"/>
  <path d="M3,0 L3,80" stroke="#9adfb4" stroke-width="1.0" fill="none" opacity="0.40"/>

  <!-- Middle frame with scroll ends -->
  <path d="M0,10 L60,10 C68,10 74,16 74,24 C74,32 68,36 62,32 C56,28 58,22 64,20"
        stroke="#9adfb4" stroke-width="0.8" fill="none" opacity="0.35"/>
  <path d="M10,0 L10,60 C10,68 16,74 24,74 C32,74 36,68 32,62 C28,56 22,58 20,64"
        stroke="#9adfb4" stroke-width="0.8" fill="none" opacity="0.35"/>

  <!-- Innermost thin frame -->
  <path d="M0,17 L48,17 C52,17 56,20 56,24"
        stroke="#9adfb4" stroke-width="0.4" fill="none" opacity="0.22"/>
  <path d="M17,0 L17,48 C17,52 20,56 24,56"
        stroke="#9adfb4" stroke-width="0.4" fill="none" opacity="0.22"/>

  <!-- === Large corner scroll flourish === -->
  <path d="M28,28 C38,18 52,18 56,28 C60,38 50,48 40,44 C30,40 26,34 28,28"
        stroke="#9adfb4" stroke-width="0.8" fill="none" opacity="0.30"/>
  <!-- Inner spiral -->
  <path d="M38,32 C42,28 48,28 48,34 C48,40 42,40 40,36"
        stroke="#9adfb4" stroke-width="0.6" fill="none" opacity="0.25"/>
  <!-- Spiral center -->
  <circle cx="44" cy="34" r="1.5" fill="#d4a44c" opacity="0.25"/>

  <!-- === Leaf cluster at corner === -->
  <path d="M12,12 C22,4 30,8 24,18 C18,28 6,22 12,12Z"
        fill="#9adfb4" opacity="0.07"/>
  <path d="M8,18 C14,10 22,12 18,20 C14,28 4,24 8,18Z"
        fill="#9adfb4" opacity="0.06"/>
  <path d="M18,8 C24,2 30,4 26,12 C22,20 12,16 18,8Z"
        fill="#9adfb4" opacity="0.05"/>
  <!-- Leaf vein lines -->
  <line x1="12" y1="12" x2="20" y2="16" stroke="#9adfb4" stroke-width="0.3" opacity="0.15"/>
  <line x1="8" y1="18" x2="14" y2="22" stroke="#9adfb4" stroke-width="0.3" opacity="0.12"/>

  <!-- === Small secondary scrolls === -->
  <!-- Along top edge -->
  <path d="M36,8 C40,4 44,6 42,10 C40,14 34,12 36,8"
        stroke="#9adfb4" stroke-width="0.5" fill="none" opacity="0.20"/>
  <path d="M52,6 C55,3 58,5 56,8"
        stroke="#9adfb4" stroke-width="0.4" fill="none" opacity="0.15"/>
  <!-- Along left edge -->
  <path d="M8,36 C4,40 6,44 10,42 C14,40 12,34 8,36"
        stroke="#9adfb4" stroke-width="0.5" fill="none" opacity="0.20"/>
  <path d="M6,52 C3,55 5,58 8,56"
        stroke="#9adfb4" stroke-width="0.4" fill="none" opacity="0.15"/>

  <!-- === Decorative dots along frames === -->
  <circle cx="24" cy="3" r="1.0" fill="#9adfb4" opacity="0.22"/>
  <circle cx="44" cy="3" r="0.8" fill="#9adfb4" opacity="0.18"/>
  <circle cx="64" cy="3" r="0.8" fill="#9adfb4" opacity="0.14"/>
  <circle cx="3" cy="24" r="1.0" fill="#9adfb4" opacity="0.22"/>
  <circle cx="3" cy="44" r="0.8" fill="#9adfb4" opacity="0.18"/>
  <circle cx="3" cy="64" r="0.8" fill="#9adfb4" opacity="0.14"/>

  <!-- Diamond accent at frame intersection -->
  <path d="M10,10 L13,7 L16,10 L13,13 Z" fill="none" stroke="#d4a44c" stroke-width="0.5" opacity="0.25"/>
  <circle cx="13" cy="10" r="0.8" fill="#d4a44c" opacity="0.22"/>

  <!-- Gold accents -->
  <circle cx="64" cy="20" r="1.5" fill="#d4a44c" opacity="0.18"/>
  <circle cx="20" cy="64" r="1.5" fill="#d4a44c" opacity="0.18"/>

  <!-- Tick marks for texture -->
  <line x1="30" y1="2" x2="30" y2="5" stroke="#9adfb4" stroke-width="0.3" opacity="0.14"/>
  <line x1="50" y1="2" x2="50" y2="5" stroke="#9adfb4" stroke-width="0.3" opacity="0.12"/>
  <line x1="70" y1="2" x2="70" y2="5" stroke="#9adfb4" stroke-width="0.3" opacity="0.10"/>
  <line x1="2" y1="30" x2="5" y2="30" stroke="#9adfb4" stroke-width="0.3" opacity="0.14"/>
  <line x1="2" y1="50" x2="5" y2="50" stroke="#9adfb4" stroke-width="0.3" opacity="0.12"/>
  <line x1="2" y1="70" x2="5" y2="70" stroke="#9adfb4" stroke-width="0.3" opacity="0.10"/>
</svg>
