<!DOCTYPE html>
<html><head><title>Waku Converter</title></head>
<body style="background:#222;color:#fff;font-family:sans-serif;padding:20px;">
<h2>waku.png → 透過PNG変換</h2>
<p>変換後の画像を右クリック → 「名前を付けて画像を保存」で waku-t.png として保存してください。</p>
<canvas id="c" style="border:1px solid #555;max-width:400px;"></canvas>
<br><br>
<a id="dl" download="waku-t.png" style="color:#9adfb4;font-size:1.2rem;">ダウンロード</a>
<script>
var img = new Image();
img.crossOrigin = 'anonymous';
img.onload = function() {
  var c = document.getElementById('c');
  c.width = img.width;
  c.height = img.height;
  var ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  var d = ctx.getImageData(0, 0, img.width, img.height);
  for (var i = 0; i < d.data.length; i += 4) {
    var r = d.data[i], g = d.data[i+1], b = d.data[i+2];
    var brightness = (r + g + b) / 3;
    d.data[i+3] = Math.min(255, Math.floor(brightness * 2.5));
  }
  ctx.putImageData(d, 0, 0);
  document.getElementById('dl').href = c.toDataURL('image/png');
  document.title = 'Done!';
};
img.src = '/assets/images/hero/waku.png';
</script>
</body>
</html>
