<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H/MIX Tag Editor v2.0</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --panel: #16161a;
      --border: rgba(255,255,255,0.07);
      --gold: #c9a84c;
      --blue: #4a9eff;
      --green: #4caf7d;
      --red: #e05c5c;
      --text: #d4d0c8;
      --text-dim: rgba(212,208,200,0.5);
      --tag-on: #c9a84c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: rgba(0,0,0,0.4); }
    .header-title { font-size: 1rem; font-weight: 700; color: var(--gold); }
    .header-actions { display: flex; gap: 8px; }
    .btn { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; transition: all 0.15s; }
    .btn:hover { background: rgba(255,255,255,0.12); border-color: var(--gold); }
    .btn--solid { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; }
    .btn--solid:hover { background: #e0bc60; }
    .btn--gold { background: transparent; border-color: var(--gold); color: var(--gold); }
    .btn-ai { background: linear-gradient(135deg, #2a1a4a, #1a2a4a); border: 1px solid rgba(100,100,200,0.4); color: #a0b0ff; cursor: pointer; transition: all 0.2s; }
    .btn-ai:hover { background: linear-gradient(135deg, #3a2a5a,#2a3a5a); border-color: rgba(150,150,255,0.6); }

    /* Layout */
    .container { display: flex; flex: 1; overflow: hidden; gap: 0; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

    /* Dashboard */
    .dashboard { width: 200px; flex-shrink: 0; overflow-y: auto; padding: 12px; margin: 8px 0 8px 8px; }
    .tag-stat { display: flex; justify-content: space-between; align-items: center; padding: 3px 6px; border-radius: 4px; cursor: pointer; margin-bottom: 2px; }
    .tag-stat:hover { background: rgba(255,255,255,0.05); }
    .tag-stat.active { background: rgba(201,168,76,0.15); }
    .tag-count { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 1px 6px; font-size: 0.7rem; min-width: 24px; text-align: center; }
    .tag-count.zero { background: rgba(224,92,92,0.3); color: var(--red); }
    .tag-count.many { background: rgba(76,175,125,0.3); color: var(--green); }
    .dash-section { margin-top: 12px; }
    .dash-section-title { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.08em; padding: 4px 4px 6px; }

    /* Track List */
    .track-list-panel { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; margin: 8px 0; overflow: hidden; }
    .list-header { padding: 8px; flex-shrink: 0; }
    .list-title { font-size: 0.75rem; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
    .search-box { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; color: var(--text); font-size: 0.72rem; }
    .tracks-container { flex: 1; overflow-y: auto; padding: 4px; }
    .track-item { padding: 6px 8px; border-radius: 5px; cursor: pointer; margin-bottom: 2px; border: 1px solid transparent; }
    .track-item:hover { background: rgba(255,255,255,0.04); }
    .track-item.active { background: rgba(201,168,76,0.12); border-color: rgba(201,168,76,0.3); }
    .track-id { font-size: 0.65rem; color: var(--text-dim); font-family: monospace; }
    .track-title { font-size: 0.78rem; line-height: 1.3; }
    .track-missing { font-size: 0.65rem; color: var(--red); margin-top: 2px; }

    /* Focus Panel */
    .focus-panel { flex: 1; display: flex; flex-direction: column; margin: 8px; overflow: hidden; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; }
    .empty-state { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 0.85rem; pointer-events: none; }
    .focus-header { padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .focus-id { font-family: monospace; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 2px; }
    .focus-title { font-size: 1rem; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
    .desc-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; padding: 8px; color: var(--text); font-size: 0.8rem; resize: vertical; margin-bottom: 8px; }
    .desc-input:focus { outline: none; border-color: rgba(201,168,76,0.4); }

    /* Audio Player */
    .audio-player { margin-bottom: 8px; }
    .player-controls { display: flex; align-items: center; gap: 8px; }
    .play-btn { background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .play-btn svg { width: 14px; height: 14px; fill: var(--gold); }
    .play-btn:hover { background: rgba(201,168,76,0.3); }
    .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; cursor: pointer; }
    .progress-fill { height: 100%; background: var(--gold); border-radius: 2px; width: 0%; transition: width 0.1s; }
    .time-display { font-size: 0.7rem; color: var(--text-dim); min-width: 30px; }
    .nav-buttons { display: flex; gap: 6px; }

    /* Tag Groups */
    .tag-groups { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .tag-group { margin-bottom: 12px; }
    .tag-group-title { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.08em; margin-bottom: 6px; }
    .tag-grid { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text-dim); padding: 3px 9px; border-radius: 12px; cursor: pointer; font-size: 0.72rem; transition: all 0.15s; }
    .tag-btn:hover { border-color: var(--gold); color: var(--text); }
    .tag-btn.on { background: rgba(201,168,76,0.2); border-color: var(--gold); color: var(--gold); font-weight: 600; }

    /* Toast */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--green); color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: pre-line; text-align: center; z-index: 9999; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* AI Reply Card */
    .ai-choice-card { background: rgba(100,120,200,0.08); border: 1px solid rgba(100,120,200,0.2); border-radius: 6px; padding: 8px 10px; font-size: 0.75rem; line-height: 1.6; cursor: pointer; white-space: pre-wrap; transition: all 0.15s; }
    .ai-choice-card:hover { background: rgba(100,120,200,0.18); border-color: rgba(150,160,255,0.5); }

    audio { display: none; }
  </style>
</head>
<body>
  <audio id="core-audio" preload="metadata" playsinline webkit-playsinline></audio>

  <header>
    <div class="header-title">
      Track Tagger <span style="background:var(--green);color:#fff;padding:2px 6px;border-radius:4px;font-size:0.7rem;margin-left:8px;">v2.0 (機能追加版)</span>
    </div>
    <div class="header-actions">
      <button class="btn btn--gold" onclick="downloadJSON()" title="tracks.jsonとしてバックアップ保存">↓ JSONDL</button>
      <button class="btn btn--solid" onclick="generateAndCopy()">📋 tracks.js をコピー</button>
      <button class="btn btn--solid" style="background:#3498db" onclick="saveViaFileAPI()" id="fs-btn" hidden>💾 ファイルに直接上書き</button>
    </div>
  </header>

  <div class="container">
    
    <!-- 1. DASHBOARD -->
    <div class="dashboard panel">
      <div id="dash-all" class="tag-stat active" onclick="setFilter(null)">
        <span>すべての曲</span>
        <span class="tag-count" id="dash-total">0</span>
      </div>
      <div id="dash-warnings" class="tag-stat" style="margin-bottom:20px;" onclick="setFilter('WARNINGS')">
        <span style="color:var(--red)">⚠ タグ不足の曲</span>
        <span class="tag-count zero" id="dash-warn-count">0</span>
      </div>
      
      <div id="dashboard-content"></div>
    </div>

    <!-- 2. TRACK LIST -->
    <div class="track-list-panel">
      <div class="list-header">
        <h2 class="list-title" id="list-title">All Tracks</h2>
        <input type="text" class="search-box" id="search-input" placeholder="曲名やIDで検索..." oninput="renderList()">
      </div>
      <div class="tracks-container panel" id="track-list">
        <!-- JS generates list -->
      </div>
    </div>

    <!-- 3. FOCUS EDITOR -->
    <div class="focus-panel" style="position:relative;">
      <div class="empty-state" id="focus-empty">左のリストから曲を選択してください</div>
      
      <div class="focus-header">
        <div class="focus-id" id="f-id">n00</div>
        <h2 class="focus-title" id="f-title">Track Title</h2>
        <textarea id="f-desc" class="desc-input" rows="2" placeholder="曲の背景や設定を入力..." oninput="updateDescription(this.value)"></textarea>
        <button class="btn btn-ai" style="font-size:0.75rem; padding:6px 12px; margin-bottom:16px; border-radius:16px; width:100%;" onclick="copyAiPrompt()">✨ グラさんに「3行説明文」をブラッシュアップしてもらう (コピー)</button>
        
        <div id="ai-reply-area" style="margin-bottom:16px; padding:12px; background:rgba(255,255,255,0.03); border-radius:8px; border:1px dashed rgba(255,255,255,0.1);">
          <div style="font-size:0.75rem; color:var(--gold); margin-bottom:8px;">↓ チャットAIの返答をここにペースト</div>
          <textarea id="ai-reply-input" class="desc-input" rows="1" style="background:rgba(0,0,0,0.5); border-color:transparent; font-size:0.75rem; margin-bottom:0;" placeholder="パターンA、B、Cなどが含まれたテキストを貼り付けてください" oninput="parseAiReply(this.value)"></textarea>
          <div id="ai-choices-container" style="display:flex; flex-direction:column; gap:8px; margin-top:8px;"></div>
        </div>
        
        <div class="audio-player">
          <div class="player-controls">
            <button class="play-btn" id="f-play-btn" onclick="togglePlay()">
              <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <div class="progress-bar" id="f-progress-bar" onclick="seek(event)">
              <div class="progress-fill" id="f-progress-fill"></div>
            </div>
            <div class="time-display" id="f-time">0:00</div>
          </div>
        </div>

        <div class="nav-buttons">
          <button class="btn" onclick="prevTrack()">▲ 前へ</button>
          <button class="btn" onclick="nextTrack()">▼ 次へ</button>
        </div>
      </div>

      <div class="tag-groups" id="focus-tags">
        <!-- JS generates toggle buttons -->
      </div>
    </div>

  </div>

  <div id="toast">コピーしました！</div>

  <!-- Load Track Data (Cache buster to always load latest file) -->
  <script>document.write('<script src="./assets/js/tracks.js?t=' + Date.now() + '"></' + 'script>');</script>
  
  <script>
    // System definitions
    let EDITOR_TAGS_META = {
      feeling: [
        {id: 'gentle', name: '優しい'}, {id: 'sad', name: '悲しい'},
        {id: 'happy', name: '楽しい'}, {id: 'epic', name: '勇壮'},
        {id: 'dark', name: '暗い'}, {id: 'mysterious', name: '神秘'},
        {id: 'suspense', name: '緊迫'}, {id: 'horror', name: 'ホラー'}
      ],
      style: [
        {id: 'fantasy', name: 'ファンタジー'}, {id: 'japanese', name: '和風'},
        {id: 'celtic', name: 'ケルト'}, {id: 'medieval', name: '中世'},
        {id: 'oriental', name: 'アジアン'}, {id: 'futuristic', name: '近未来'},
        {id: 'electronic', name: '電子音'}
      ],
      scene: [
        {id: 'battle', name: '戦闘'}, {id: 'boss', name: 'ボス'},
        {id: 'town', name: '街'}, {id: 'village', name: '村'},
        {id: 'field', name: 'フィールド'}, {id: 'forest', name: '森'},
        {id: 'night', name: '夜'}, {id: 'travel', name: '旅'},
        {id: 'dungeon', name: 'ダンジョン'}, {id: 'ruins', name: '遺跡'},
        {id: 'cave', name: '洞窟'}, {id: 'festival', name: '祭り'},
        {id: 'opening', name: 'オープニング'}, {id: 'ending', name: 'エンディング'},
        {id: 'onsen', name: '温泉'}, {id: 'shrine', name: '神社'},
        {id: 'samurai', name: 'サムライ'}
      ],
      story: [
        {id: 'memory', name: '思い出'}, {id: 'reunion', name: '再会'},
        {id: 'farewell', name: '別れ'}, {id: 'victory', name: '勝利'},
        {id: 'defeat', name: '敗北'}, {id: 'peaceful', name: '平和'},
        {id: 'dream', name: '夢'}, {id: 'conspiracy', name: '陰謀'}
      ]
    };

    let localTracks = [];
    let activeFilter = null; // null | 'WARNINGS' | {cat, id}
    let currentTrackIndex = -1;
    let filteredList = [];
    let unsavedChanges = false;

    // Audio
    const audio = document.getElementById('core-audio');
    audio.volume = 0.5;

    audio.addEventListener('timeupdate', () => {
      if(audio.duration){
        const percent = (audio.currentTime / audio.duration) * 100;
        document.getElementById('f-progress-fill').style.width = percent + '%';
        document.getElementById('f-time').textContent = formatTime(audio.currentTime);
      }
    });
    audio.addEventListener('ended', () => {
      document.getElementById('icon-play').style.display = 'block';
      document.getElementById('icon-pause').style.display = 'none';
      document.getElementById('f-progress-fill').style.width = '0%';
    });

    function formatTime(s) {
      if (isNaN(s)) return "0:00";
      const m = Math.floor(s / 60);
      const secs = Math.floor(s % 60);
      return `${m}:${secs.toString().padStart(2, '0')}`;
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      if (typeof TAGS_META !== 'undefined') {
        EDITOR_TAGS_META = JSON.parse(JSON.stringify(TAGS_META));
      }
      if (typeof window.TRACKS !== 'undefined' || typeof TRACKS !== 'undefined') {
        const rawTracks = typeof window.TRACKS !== 'undefined' ? window.TRACKS : TRACKS;
        localTracks = JSON.parse(JSON.stringify(rawTracks)); // Deep copy to edit
        initDashboard();
        initFocusTags();
        renderList();
        checkFileAPI();
      } else {
        alert("tracks.js の読み込みに失敗しました。ローカルサーバー経由か確認してください。");
      }
    });

    // Dashboard
    function initDashboard() {
      const container = document.getElementById('dashboard-content');
      container.innerHTML = '';
      
      const cats = {
        feeling: "Feeling (感情)",
        style: "Style (様式)",
        scene: "Scene (場面)",
        story: "Story (物語)"
      };

      for (const cat in EDITOR_TAGS_META) {
        const wrap = document.createElement('div');
        wrap.className = 'dash-section';
        wrap.innerHTML = `<h3 class="dash-section-title">${cats[cat]}</h3>`;
        
        EDITOR_TAGS_META[cat].forEach(tag => {
          const el = document.createElement('div');
          el.className = 'tag-stat';
          el.id = `dash-${cat}-${tag.id}`;
          el.onclick = () => setFilter(cat, tag.id, tag.name);
          el.innerHTML = `<span>${tag.name}</span> <span class="tag-count" id="count-${cat}-${tag.id}">0</span>`;
          wrap.appendChild(el);
        });
        container.appendChild(wrap);
      }
      updateDashboardCounts();
    }

    function updateDashboardCounts() {
      let warnCount = 0;
      
      document.getElementById('dash-total').textContent = localTracks.length;

      for (const cat in EDITOR_TAGS_META) {
        EDITOR_TAGS_META[cat].forEach(tag => {
          let count = 0;
          localTracks.forEach(tr => {
            if (tr[cat] && tr[cat].includes(tag.id)) count++;
          });
          const badge = document.getElementById(`count-${cat}-${tag.id}`);
          if(badge){
            badge.textContent = count;
            badge.className = 'tag-count';
            if (count === 0) badge.classList.add('zero');
            if (count > 40) badge.classList.add('many');
          }
        });
      }

      // Warnings
      localTracks.forEach(tr => {
        if (!tr.feeling || tr.feeling.length===0 || !tr.scene || tr.scene.length===0) {
          warnCount++;
        }
      });
      const wc = document.getElementById('dash-warn-count');
      wc.textContent = warnCount;
      wc.className = 'tag-count ' + (warnCount > 0 ? 'zero' : '');
    }

    function setFilter(cat, tagId, tagName) {
      document.querySelectorAll('.tag-stat').forEach(el => el.classList.remove('active'));
      
      if (!cat) { // All
        activeFilter = null;
        document.getElementById('dash-all').classList.add('active');
        document.getElementById('list-title').textContent = "すべての曲";
      } else if (cat === 'WARNINGS') {
        activeFilter = 'WARNINGS';
        document.getElementById('dash-warnings').classList.add('active');
        document.getElementById('list-title').innerHTML = "<span style='color:var(--red)'>⚠ タグ不足の曲</span>";
      } else {
        activeFilter = { cat, id: tagId };
        document.getElementById(`dash-${cat}-${tagId}`).classList.add('active');
        document.getElementById('list-title').textContent = `${tagName} の曲`;
      }
      
      document.getElementById('search-input').value = '';
      renderList();
    }

    // List
    function renderList() {
      const q = document.getElementById('search-input').value.toLowerCase();
      
      filteredList = localTracks.filter(tr => {
        if (activeFilter === 'WARNINGS') {
          if (tr.feeling && tr.feeling.length>0 && tr.scene && tr.scene.length>0) return false;
        } else if (activeFilter !== null) {
          if (!tr[activeFilter.cat] || !tr[activeFilter.cat].includes(activeFilter.id)) return false;
        }
        
        if (q) {
          if (!tr.title.toLowerCase().includes(q) && !tr.id.toLowerCase().includes(q)) return false;
        }
        
        return true;
      });

      const container = document.getElementById('track-list');
      container.innerHTML = '';

      filteredList.forEach((tr, i) => {
        const item = document.createElement('div');
        item.className = 'track-item';
        item.id = `li-${i}`;
        item.onclick = () => focusTrack(i);
        
        let missing = [];
        if(!tr.feeling || tr.feeling.length===0) missing.push('Feeling');
        if(!tr.scene || tr.scene.length===0) missing.push('Scene');
        let warnText = missing.length > 0 ? `<div class="track-missing">⚠ 必須タグ未設定: ${missing.join(', ')}</div>` : '';

        item.innerHTML = `
          <div class="track-id">${tr.id}</div>
          <div class="track-title">${tr.title}</div>
          ${warnText}
        `;
        container.appendChild(item);
      });

      if (currentTrackIndex >= 0 && currentTrackIndex < filteredList.length) {
        highlightListItem(currentTrackIndex);
      } else {
        currentTrackIndex = -1;
        document.getElementById('focus-empty').style.display = 'flex';
        audio.pause();
      }
    }

    function highlightListItem(index) {
      document.querySelectorAll('.track-item').forEach(el => el.classList.remove('active'));
      const activeEl = document.getElementById(`li-${index}`);
      if(activeEl) {
        activeEl.classList.add('active');
        activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    // Focus View
    function initFocusTags() {
      const container = document.getElementById('focus-tags');
      container.innerHTML = '';
      
      const cats = { feeling: "Feeling", style: "Style", scene: "Scene", story: "Story" };

      for (const cat in EDITOR_TAGS_META) {
        const group = document.createElement('div');
        group.className = 'tag-group';
        group.innerHTML = `<div class="tag-group-title">${cats[cat] || cat}</div>`;
        const grid = document.createElement('div');
        grid.className = 'tag-grid';

        EDITOR_TAGS_META[cat].forEach(tag => {
          const btn = document.createElement('button');
          btn.className = 'tag-btn';
          btn.id = `ftag-${cat}-${tag.id}`;
          btn.textContent = tag.name;
          btn.onclick = () => toggleTag(cat, tag.id);
          grid.appendChild(btn);
        });
        
        const addBtn = document.createElement('button');
        addBtn.className = 'tag-btn';
        addBtn.style.borderStyle = 'dashed';
        addBtn.style.opacity = '0.6';
        addBtn.textContent = '＋ 追加';
        addBtn.onclick = () => promptAddTag(cat);
        grid.appendChild(addBtn);

        group.appendChild(grid);
        container.appendChild(group);
      }
    }

    function promptAddTag(cat) {
      const name = prompt("追加するタグ名（日本語）を入力してください\n例: ピアノ");
      if (!name) return;
      const id = prompt("タグのID（半角英数）を入力してください\n例: piano");
      if (!id || !/^[a-zA-Z0-9_\-]+$/.test(id)) {
        alert("無効なIDです。半角英数のみを使用してください。");
        return;
      }
      if (EDITOR_TAGS_META[cat].find(t => t.id === id)) {
        alert("そのIDは既に存在しています。");
        return;
      }
      EDITOR_TAGS_META[cat].push({ id, name });
      initDashboard(); 
      initFocusTags(); 
      if (currentTrackIndex >= 0) {
        focusTrack(currentTrackIndex); 
      }
      showToast(name + " を追加しました！");
    }

    function focusTrack(index) {
      if (index < 0 || index >= filteredList.length) return;
      currentTrackIndex = index;
      const tr = filteredList[index];

      document.getElementById('focus-empty').style.display = 'none';
      highlightListItem(index);

      document.getElementById('f-id').textContent = tr.id;
      document.getElementById('f-title').textContent = tr.title;
      document.getElementById('f-desc').value = tr.description ? tr.description : '';
      
      document.getElementById('ai-reply-input').value = '';
      document.getElementById('ai-choices-container').innerHTML = '';

      // Load Audio
      const src = tr.mp3.startsWith('/') ? '.' + tr.mp3 : './' + tr.mp3;
      audio.src = src;
      document.getElementById('f-time').textContent = '0:00';
      document.getElementById('f-progress-fill').style.width = '0%';
      document.getElementById('icon-play').style.display = 'none';
      document.getElementById('icon-pause').style.display = 'block';
      audio.play().catch(e => {
        document.getElementById('icon-play').style.display = 'block';
        document.getElementById('icon-pause').style.display = 'none';
      });

      // Set tag button states
      for (const cat in EDITOR_TAGS_META) {
        const arr = tr[cat] || [];
        EDITOR_TAGS_META[cat].forEach(tag => {
          const btn = document.getElementById(`ftag-${cat}-${tag.id}`);
          if(arr.includes(tag.id)) {
            btn.classList.add('on');
          } else {
            btn.classList.remove('on');
          }
        });
      }
    }

    function toggleTag(cat, tagId) {
      if (currentTrackIndex < 0) return;
      const tr = filteredList[currentTrackIndex];
      const orig = localTracks.find(t => t.id === tr.id);
      if (!orig) return;

      if (!orig[cat]) orig[cat] = [];
      const arr = orig[cat];
      
      const idx = arr.indexOf(tagId);
      if (idx === -1) {
        arr.push(tagId);
      } else {
        arr.splice(idx, 1);
      }
      
      focusTrack(currentTrackIndex);
      updateDashboardCounts();
    }

    function togglePlay() {
      if (audio.paused) {
        audio.play().catch(e=>console.log(e));
        document.getElementById('icon-play').style.display = 'none';
        document.getElementById('icon-pause').style.display = 'block';
      } else {
        audio.pause();
        document.getElementById('icon-play').style.display = 'block';
        document.getElementById('icon-pause').style.display = 'none';
      }
    }

    function seek(e) {
      const bar = document.getElementById('f-progress-bar');
      const rect = bar.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      audio.currentTime = audio.duration * pct;
    }

    function prevTrack() {
      if (currentTrackIndex > 0) focusTrack(currentTrackIndex - 1);
    }
    function nextTrack() {
      if (currentTrackIndex < filteredList.length - 1) focusTrack(currentTrackIndex + 1);
    }

    // Output & Save
    function generateJSCode() {
      const jsonTracks = JSON.stringify(localTracks, null, 2);
      const jsonTags = JSON.stringify(EDITOR_TAGS_META, null, 2);
      let output = `/*
 * H/MIX GALLERY — tracks.js
 * (Exported from Tag Editor)
 */
const HMIX_BASE_PATH = (function() {
  if (typeof window !== 'undefined') {
    if (window.location.pathname.startsWith('/test2026/') || window.location.pathname === '/test2026') return '/test2026';
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') return '';
  }
  return '';
})();

const TAGS_META = ${jsonTags};
const TRACKS = ${jsonTracks};

if (typeof window !== 'undefined') {
  window.TRACKS = TRACKS;
  window.TAGS_META = TAGS_META;
}

if (typeof module !== 'undefined' && typeof module.exports !== 'undefined') {
  module.exports = { TRACKS, TAGS_META };
}
`;
      return output;
    }

    function generateAndCopy() {
      const text = generateJSCode();
      navigator.clipboard.writeText(text).then(() => {
        showToast("クリップボードにコピーしました！\nassets/js/tracks.js に貼り付けてください。");
      });
    }

    function downloadJSON() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(localTracks, null, 2));
      const dlAnchorElem = document.createElement('a');
      dlAnchorElem.setAttribute("href", dataStr);
      dlAnchorElem.setAttribute("download", "tracks_backup.json");
      dlAnchorElem.click();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // File System Access API
    let fileHandle;
    async function checkFileAPI() {
      if ('showOpenFilePicker' in window) {
        document.getElementById('fs-btn').hidden = false;
      }
    }
    async function saveViaFileAPI() {
      try {
        if (!fileHandle) {
          const [handle] = await window.showOpenFilePicker({
            types: [{ description: 'JavaScript Files', accept: {'text/javascript': ['.js']} }],
          });
          fileHandle = handle;
        }
        const text = generateJSCode();
        const writable = await fileHandle.createWritable();
        await writable.write(text);
        await writable.close();
        showToast("✓ tracks.js を直接上書き保存しました！");
      } catch (err) {
        console.error(err);
        if(err.name !== 'AbortError') {
          showToast("保存に失敗しました：" + err.message);
        }
      }
    }

    function updateDescription(val) {
      if (currentTrackIndex < 0) return;
      filteredList[currentTrackIndex].description = val;
      unsavedChanges = true;
    }

    function copyAiPrompt() {
      if (currentTrackIndex < 0) return;
      const track = filteredList[currentTrackIndex];
      const tags = [];
      const cats = ['feeling', 'style', 'scene', 'story'];
      for (const cat of cats) {
        if (track[cat]) {
          track[cat].forEach(tId => {
            const meta = EDITOR_TAGS_META[cat].find(x => x.id === tId);
            if (meta) tags.push(meta.name);
          });
        }
      }
      
      const promptText = `H/MIX GALLERYの新サイト用に、以下の曲の【設定メモ】と【関連タグ】を解釈して、世界観が伝わるエモーショナルで魅力的な「3行の説明文」にブラッシュアップしてください！
サイトのトーン（静謐、幻想的、夜、森、魔法など）に合う言葉遣いでお願いします。

【曲名】${track.title}
【設定・メモ】
${track.description || "（メモなし。曲名とタグから想像してください！）"}
【関連タグ】
${tags.join(', ')}

※出力はそのままサイトに使える3行のテキストのみでお願いします！`;
      
      navigator.clipboard.writeText(promptText).then(() => {
        showToast("グラさんへの依頼プロンプトをコピーしました！チャット欄に貼り付けてください。");
      });
    }

    function parseAiReply(text) {
      const container = document.getElementById('ai-choices-container');
      container.innerHTML = '';
      if (!text || !text.trim()) return;

      let choices = [];
      const codeRegex = /```(?:text)?\n([\s\S]*?)```/g;
      let match;
      while ((match = codeRegex.exec(text)) !== null) {
        if(match[1].trim()) choices.push(match[1].trim());
      }
      
      if (choices.length === 0) {
        const parts = text.split(/(?:###\s*|\*\*|)パターン[A-ZＡ-Ｚ](?:[^\n]*\n)/);
        choices = parts.slice(1).map(p => p.trim()).filter(p => p.length > 0);
      }

      if (choices.length === 0) return;

      choices.forEach((choice, i) => {
        const card = document.createElement('div');
        card.className = 'ai-choice-card';
        card.innerText = choice;
        card.onclick = () => {
          document.getElementById('f-desc').value = choice;
          updateDescription(choice);
          document.getElementById('ai-reply-input').value = '';
          container.innerHTML = '';
          showToast("説明文を適用しました！");
        };
        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
