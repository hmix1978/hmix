  // スクリーン枠の中で再生（動画 / YouTube）

  // ============ シアター内蔵 YouTube プレーヤー ============

  var ytPlayer = null, ytApiLoading = false, ytReadyCbs = [], ytProgT = 0, ytIdleT = 0;
  var YT_SVG = {
    play:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',

  // 映像の表示モード（contain=ぴったり/cover=フィル）。枠が約2:1で16:9動画が小さく見える対策

  function buildYTPlayer(src){

  function openPlaylistMode(){

  function closePlaylistMode(){
    state.playlistMode = false;

    closeMedia();
    var p=document.getElementById('ft-pl'); if(p) p.classList.remove('on');
    var u=document.getElementById('ft-used'); if(u) u.classList.remove('on');

    clearTimeout(idleT); document.body.classList.remove('ft-ui-idle');

  var idleT=0, idlePointer=null, WAKE_SPEED=820, WAKE_DIST=42;
  function uiWake(force){
    if(!state.playlistMode) return;
    document.body.classList.remove('ft-ui-idle');
    clearTimeout(idleT);
    if(adminMode) return;
    idleT = setTimeout(function(){
      if(state.playlistMode && !adminMode) document.body.classList.add('ft-ui-idle');
    }, 3500);
  }
  function uiMove(ev){
    if(!state.playlistMode) return;
    if(!ev || ev.pointerType === 'touch'){ uiWake(true); return; }
    var now=(window.performance&&performance.now)?performance.now():Date.now();
    var prev=idlePointer;
    idlePointer={x:ev.clientX||0, y:ev.clientY||0, t:now};
    if(adminMode){ uiWake(true); return; }
    if(document.body.classList.contains('ft-ui-idle')){
      if(!prev) return;
      var dx=idlePointer.x-prev.x, dy=idlePointer.y-prev.y, dist=Math.sqrt(dx*dx+dy*dy);
      var dt=Math.max(16, now-prev.t);
      var speed=dist/(dt/1000);
      if(speed>=WAKE_SPEED || dist>=WAKE_DIST) uiWake(true);
      return;
    }
    uiWake(true);
  }
  function bindUIHover(el){

  function clearPlayingRows(){ var r=document.querySelectorAll('#ft-pl-body .pl-row.playing'); for(var i=0;i<r.length;i++) r[i].classList.remove('playing'); }
  var PLVOLK='hmix.theater.previewVol', plVol=0.8;
  try{ var pv=parseFloat(localStorage.getItem(PLVOLK)); if(isFinite(pv)) plVol=Math.max(0,Math.min(1,pv)); }catch(_){}
  function setPreviewVolume(v){
    plVol=Math.max(0,Math.min(1,Number(v)||0));

  function previewTrack(t, row){
    if(!plAudio){ plAudio=new Audio(); plAudio.addEventListener('ended', function(){ clearPlayingRows(); plPlayingId=null; }); }

  }

  // ===== この映像で使われている曲（左カード）＋ 秋山用 裏フォーム =====
  var USEDK='hmix.theater.usedTracks', adminMode=false, adminNow=0, adminTimer=0, ytLastCur=-1, ytNoEmbed={}, ytCurVid=null, ytErrStreak=0;
  function loadUsed(){ try{ return JSON.parse(localStorage.getItem(USEDK)||'{}'); }catch(_){ return {}; } }
  function saveUsed(m){ try{ localStorage.setItem(USEDK, JSON.stringify(m)); }catch(_){} }
  function baseUsed(vid){ return (WORKS_USED_TRACKS&&WORKS_USED_TRACKS[vid])?WORKS_USED_TRACKS[vid].slice():[]; }
  function usedFor(vid){ var m=loadUsed(); return m[vid]!=null ? m[vid] : baseUsed(vid); }
  function trackById(id){ var T=window.TRACKS||[]; for(var i=0;i<T.length;i++) if(String(T[i].id)===String(id)) return T[i]; return null; }
  function fmtSec(s){ s=Math.max(0,Math.floor(s||0)); var m=Math.floor(s/60),ss=s%60; return m+':'+(ss<10?'0':'')+ss; }
  function currentVideoTime(){
    try{
      if(ytPlayer && ytPlayer.getCurrentTime){
        var t = ytPlayer.getCurrentTime();
        if(isFinite(t)) return Math.max(0, Math.floor(t));
      }
    }catch(e){}
    return Math.max(0, Math.floor(adminNow||0));
  }
  function trackSearchText(t){
    return [
      t && t.id,
      t && t.title,
      t && t.title_en,
      t && t.subtitle,
      t && t.description,
      t && t.description_en
    ].join(' ').toLowerCase();
  }
  // 現在の動画ID：playlistIndex 経由を最優先（切替直後も確実）。getVideoData はフォールバック
  function curVideoId(){
    try{ if(ytPlayer&&ytPlayer.getPlaylist&&ytPlayer.getPlaylistIndex){
      var ids=ytPlayer.getPlaylist()||[], idx=ytPlayer.getPlaylistIndex();
      if(ids.length && idx>=0 && ids[idx]) return ids[idx];
    } }catch(e){}
    try{ var d=ytPlayer&&ytPlayer.getVideoData&&ytPlayer.getVideoData(); return (d&&d.video_id)||null; }catch(e){ return null; }
  }
  // 次/前：nextVideo は既存iframeバインドだと不安定なため、確実に動く playVideoAt で送る
  function ytRel(delta){
    if(!ytPlayer||!ytPlayer.getPlaylist||!ytPlayer.playVideoAt) return;
    var ids; try{ ids=ytPlayer.getPlaylist()||[]; }catch(e){ return; }
    if(!ids.length) return;
    var idx=0; try{ idx=ytPlayer.getPlaylistIndex(); }catch(e){}
    if(idx<0) idx=0;
    try{ ytPlayer.playVideoAt((idx+delta+ids.length)%ids.length); }catch(e){}
  }
  function addUsed(vid, e){ vid = vid || ytCurVid; if(!vid) return; var m=loadUsed(); if(m[vid]==null) m[vid]=baseUsed(vid); m[vid].push(e); saveUsed(m); renderUsed(vid); try{ refreshYTRowsUsedCount(); }catch(_){} }
  function delUsed(vid, i){ var m=loadUsed(); if(m[vid]==null) m[vid]=baseUsed(vid); m[vid].splice(i,1); saveUsed(m); renderUsed(vid); try{ refreshYTRowsUsedCount(); }catch(_){} }

  function renderUsed(vid){
    vid = vid || ytCurVid;
    var card=document.getElementById('ft-used'); if(!card) return;
    var p=PLAYLISTS[plActive];
    if(!state.playlistMode || !p || p.type!=='youtube'){ card.classList.remove('on'); return; }

    card.classList.add('on'); card.classList.toggle('admin', adminMode);

      }

         '<input class="u-search" id="u-search" placeholder="曲名を打つと候補が出ます" autocomplete="off">'+
         '<div class="u-cands" id="u-cands"></div>'+
         '<div class="u-arow"><button class="u-btn" id="u-unrel">＋ 未公開曲</button><button class="u-btn gold" id="u-export">JSONをコピー</button></div></div>';

  function wireUsed(card, vid){
    [].forEach.call(card.querySelectorAll('[data-fav]'), function(el){ el.addEventListener('click', function(){ var on=toggleFavId(el.getAttribute('data-fav')); el.classList.toggle('on',on); el.textContent=on?'♥':'♡'; }); });
    [].forEach.call(card.querySelectorAll('[data-play]'), function(el){ el.addEventListener('click', function(){ var t=trackById(el.getAttribute('data-play')); if(t) previewTrack(t, null); }); });
    [].forEach.call(card.querySelectorAll('[data-del]'), function(el){ el.addEventListener('click', function(){ delUsed(vid, +el.getAttribute('data-del')); }); });
    var pv=card.querySelector('#u-preview-vol'); if(pv) pv.addEventListener('input', function(){ setPreviewVolume((+pv.value||0)/100); });
    if(adminMode){
      var s=card.querySelector('#u-search'), box=card.querySelector('#u-cands');
      if(s){ s.addEventListener('input', function(){
        var q=(s.value||'').trim().toLowerCase(); if(!q){ box.innerHTML=''; return; }
        var T=window.TRACKS||[], r=[];
        for(var i=0;i<T.length && r.length<8;i++){ var t=T[i]; if(trackSearchText(t).indexOf(q)>=0) r.push(t); }

        [].forEach.call(box.querySelectorAll('.u-cand'), function(el){ el.addEventListener('click', function(){
          addUsed(vid, {id:el.getAttribute('data-id'), t:currentVideoTime()});
        }); });
      }); }
      var un=card.querySelector('#u-unrel'); if(un) un.addEventListener('click', function(){ var nm=prompt('未公開曲の名前'); if(nm) addUsed(vid, {name:nm, unreleased:true, t:currentVideoTime()}); });
      var ex=card.querySelector('#u-export'); if(ex) ex.addEventListener('click', function(){
        // WORKS_USED_TRACKS にそのまま貼れる形で書き出す

        var body=JSON.stringify(data, null, 2);
        var txt='// WORKS_USED_TRACKS に貼り付け（' + Object.keys(data).length + '本分）\n' + body;
        try{ navigator.clipboard.writeText(txt); ex.textContent='コピーしました ✓'; setTimeout(function(){ ex.textContent='JSONをコピー'; },1600); }catch(e){ prompt('コピーしてください', txt); }
      });
    }
  }

    if(!media) return; var m=document.getElementById('ft-yt-msg');
    if(!m){ m=document.createElement('div'); m.id='ft-yt-msg';
      m.style.cssText='position:absolute; inset:0; z-index:4; display:grid; place-items:center; text-align:center; padding:0 8%; background:rgba(5,9,7,.86); color:rgba(238,240,234,.92); font-family:"Noto Sans JP",sans-serif; font-size:13px; line-height:1.8;';
      media.appendChild(m); }
    m.innerHTML='このプレイリストの映像は、現在すべて<br>シアター内で再生できません。<br><span style="font-size:11px;color:rgba(206,222,206,.6);">右の一覧から個別に開くか、YouTube で直接ご覧ください。</span>';
    m.style.display='grid';
  }
  function hideNoEmbed(){ var m=document.getElementById('ft-yt-msg'); if(m) m.style.display='none'; }

  function renderYTRows(p, ids, cur, pending){
    ids = ids || [];
    if(!ids.length) return false;
    var body=document.getElementById('ft-pl-body'); if(!body) return false;
    var head=document.querySelector('#ft-pl-head h4'), sub=document.querySelector('#ft-pl-head p');
    if(head) head.textContent='収録映像';
    if(sub) sub.textContent=ids.length+'本 · '+(pending?'YouTube接続中':'クリックで再生');
    if(ytVidIds.join(',')!==ids.join(',')){
      ytVidIds=ids.slice();
      body.innerHTML='';
      ids.forEach(function(vid, idx){
        var row=document.createElement('div'); row.className='pl-vrow'; row.setAttribute('data-vid', vid);
        var used=(usedFor(vid)||[]).length;
        var badge=used?('<div class="pl-vused" data-used-badge>使用曲 '+used+'</div>'):'<div class="pl-vused" data-used-badge style="display:none">使用曲</div>';
        row.innerHTML=
          '<div class="pl-vth"><img loading="lazy" src="https://i.ytimg.com/vi/'+vid+'/mqdefault.jpg" alt=""><span class="pl-vplay">▶</span></div>'+
          '<div class="pl-vmeta"><div class="pl-vix">MOVIE '+(idx<9?'0':'')+(idx+1)+'</div><div class="pl-vt">'+esc((p.titles&&p.titles[vid])||ytTitles[vid]||('映像 '+(idx+1)))+'</div>'+badge+'</div>'+
          '<div class="pl-vnow">NOW</div>';
        row.addEventListener('click', function(){
          try{ if(ytPlayer&&ytPlayer.playVideoAt) ytPlayer.playVideoAt(idx); }catch(e){}
          ytCurVid=vid; markYTCurrent(idx); try{ renderUsed(vid); }catch(e){}
        });
        body.appendChild(row);
      });
    }
    refreshYTRowsUsedCount();
    markYTCurrent(cur);
    return true;
  }
  // 「使用曲N」バッジを最新化（登録・削除後に呼ぶ）
  function refreshYTRowsUsedCount(){
    var rows=document.querySelectorAll('#ft-pl-body .pl-vrow');
    for(var i=0;i<rows.length;i++){
      var v=rows[i].getAttribute('data-vid');
      var n=(usedFor(v)||[]).length;
      var b=rows[i].querySelector('[data-used-badge]');
      if(b){
        if(n){ b.textContent='使用曲 '+n; b.style.display=''; }
        else  { b.style.display='none'; }
      }
    }
  }
  function markYTCurrent(cur){
    var rows=document.querySelectorAll('#ft-pl-body .pl-vrow');
    for(var i=0;i<rows.length;i++){
      var v=rows[i].getAttribute('data-vid');
      var p=PLAYLISTS[plActive], ttl=(p&&p.titles&&p.titles[v])||ytTitles[v];
      if(ttl){ var tEl=rows[i].querySelector('.pl-vt'); if(tEl) tEl.textContent=ttl; }
      rows[i].classList.toggle('noembed', !!ytNoEmbed[v]);
      var on=(i===cur); rows[i].classList.toggle('playing', on);
      if(on) try{ rows[i].scrollIntoView({block:'nearest'}); }catch(e){}
    }
  }

  // YouTube プレイリストの「収録映像セレクター」を右パネルに描画（API getPlaylist から）
  function ytSyncList(){
    if(!state.playlistMode) return;
    var p=PLAYLISTS[plActive]; if(!p || p.type!=='youtube') return;
    if(!ytPlayer || !ytPlayer.getPlaylist) return;
    var ids; try{ ids=ytPlayer.getPlaylist()||[]; }catch(e){ return; }
    if(!ids.length) return;
    var cur=0; try{ cur=ytPlayer.getPlaylistIndex(); }catch(e){}
    try{ var d=ytPlayer.getVideoData&&ytPlayer.getVideoData(); if(d&&d.video_id&&d.title) ytTitles[d.video_id]=d.title; }catch(e){}
    renderYTRows(p, ids, cur, false);
    ytCurVid = ids[cur] || ytCurVid;   // 権威ある現在動画ID（インデックス基準）。getVideoDataの遅延に依存しない
    if(cur!==ytLastCur){ ytLastCur=cur; try{ renderUsed(ytCurVid); }catch(e){} }
  }


  function setupLeaves(){
    if(!leafCanvas||!leafCtx) return;
    window.addEventListener('resize', function(){ setTimeout(resizeLeaves,80); });
    resizeLeaves();
    updateLeaves();
  }
  function leavesAllowed(){
    if(window.matchMedia && window.matchMedia('(max-width: 600px)').matches) return false;
    if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return false;
    var k = curKey();
    return k === 'forest' || k === 'ruins';
  }
  function resizeLeaves(){
    if(!leafCanvas||!leafCtx) return;
    var dpr = Math.min(window.devicePixelRatio||1,2);
    leafCanvas.width = Math.max(1, Math.floor(window.innerWidth*dpr));
    leafCanvas.height = Math.max(1, Math.floor(window.innerHeight*dpr));
    leafCanvas.style.width = window.innerWidth+'px';
    leafCanvas.style.height = window.innerHeight+'px';
    leafCtx.setTransform(dpr,0,0,dpr,0,0);
    seedLeaves();
  }
  function seedLeaves(){
    leaves = [];
    if(!leafCanvas||!leafCtx) return;
    var n = 13; // 実験ページの葉: 密度1相当
    for(var i=0;i<n;i++) leaves.push(makeLeaf(true));
  }
  function makeLeaf(fresh){
    var w=window.innerWidth, h=window.innerHeight;
    return {
      x: -60 + Math.random()*(w+120),
      y: fresh ? -h + Math.random()*(h*2) : -50,
      r: 3 + Math.random()*6,
      vx: -14 + Math.random()*42,   // 実験ページの葉: 速度100相当
      vy: 14 + Math.random()*28,
      rot: Math.random()*Math.PI*2,
      spin: -2 + Math.random()*4,
      seed: Math.random()*1000,
      alpha: .34 + Math.random()*.18
    };
  }
  function updateLeaves(){
    if(!leafCanvas||!leafCtx) return;
    leafActive = leavesAllowed();
    leafCanvas.style.display = leafActive ? 'block' : 'none';
    if(leafActive && !leafRAF){
      if(!leaves.length) seedLeaves();
      leafLast = 0;
      leafRAF = requestAnimationFrame(drawLeaves);
    }
  }
  function drawLeaf(p){
    leafCtx.save();
    leafCtx.translate(p.x,p.y);
    leafCtx.rotate(p.rot);
    leafCtx.globalAlpha = p.alpha;
    leafCtx.fillStyle = curKey() === 'ruins' ? 'rgba(199,216,121,.78)' : 'rgba(176,184,102,.72)';
    leafCtx.beginPath();
    leafCtx.ellipse(0,0,p.r*.55,p.r,0,0,Math.PI*2);
    leafCtx.fill();
    leafCtx.restore();
  }
  function drawLeaves(now){
    leafRAF = 0;
    if(!leafActive || !leafCanvas || !leafCtx) return;
    var dt = Math.min(40, now - (leafLast || now)) / 1000;
    leafLast = now;
    leafCtx.clearRect(0,0,window.innerWidth,window.innerHeight);
    for(var i=0;i<leaves.length;i++){
      var p = leaves[i];
      p.x += p.vx * dt + Math.sin(now*.001 + p.seed) * dt * 20;
      p.y += p.vy * dt;
      p.rot += p.spin * dt;
      if(p.y > window.innerHeight + 60 || p.x < -120 || p.x > window.innerWidth + 120) leaves[i] = p = makeLeaf(false);
      drawLeaf(p);
    }
    leafRAF = requestAnimationFrame(drawLeaves);
  }

  function setupRailSlider(){
    var wrap=$('ft-rail-wrap'), prev=$('ft-rail-prev'), next=$('ft-rail-next');
    if(!rail||!wrap) return;
    function firstItem(){ return rail.querySelector('.ft-prog'); }
    function thumbH(){ var f=firstItem(); var t=f&&f.firstElementChild; return t?t.offsetHeight:60; }
    function hasOverflow(){ return rail.scrollWidth>rail.clientWidth+2; }
    function update(){
      var max=rail.scrollWidth-rail.clientWidth-1;
      var overflow=hasOverflow();
      var canL=rail.scrollLeft>2, canR=rail.scrollLeft<max;
      var th=thumbH();
      if(prev){ prev.style.display=(overflow&&canL)?'grid':'none'; prev.style.top=(th/2+14)+'px'; }
      if(next){ next.style.display=(overflow&&canR)?'grid':'none'; next.style.top=(th/2+14)+'px'; }
      var m='';
      if(overflow){
        var L=canL?'transparent 0, #000 7%':'#000 0, #000 0';
        var R=canR?'#000 93%, transparent 100%':'#000 100%, #000 100%';
        m='linear-gradient(to right, '+L+', '+R+')';
      }
      rail.style.webkitMaskImage=m;
      rail.style.maskImage=m;
    }
    function clampTo(v){ return Math.max(0, Math.min(v, rail.scrollWidth-rail.clientWidth)); }
    var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function animateTo(target){
      target=clampTo(target);
      if(reduce){ rail.scrollLeft=target; update(); return; }
      var start=rail.scrollLeft, d=target-start, t0=performance.now(), dur=340;
      rail.classList.add('dragging');
      (function fr(now){
        var p=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-p,3);
        rail.scrollLeft=start+d*e;
        if(p<1) requestAnimationFrame(fr); else { rail.classList.remove('dragging'); update(); }
      })(performance.now());
    }
    function step(dir){
      var f=firstItem(); var w=f?f.offsetWidth:120;
      animateTo(rail.scrollLeft + dir*(w+14)*2);
    }
    if(prev) prev.addEventListener('click', function(e){ e.stopPropagation(); step(-1); });
    if(next) next.addEventListener('click', function(e){ e.stopPropagation(); step(1); });
    rail.addEventListener('scroll', update, { passive:true });
    rail.addEventListener('wheel', function(e){
      if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){ rail.scrollLeft+=e.deltaY; e.preventDefault(); }
    }, { passive:false });
    var dragging=false, moved=false, sx=0, sl=0;
    rail.addEventListener('pointerdown', function(e){
      if(e.pointerType!=='mouse'||e.button!==0||!hasOverflow()) return;
      dragging=true; moved=false; sx=e.clientX; sl=rail.scrollLeft;
      if(rail.setPointerCapture) try{ rail.setPointerCapture(e.pointerId); }catch(_){}
      rail.classList.add('dragging');
    });
    rail.addEventListener('pointermove', function(e){
      if(!dragging) return;
      var dx=e.clientX-sx; if(Math.abs(dx)>12) moved=true;
      rail.scrollLeft=sl-dx;
    });
    function end(){ if(!dragging) return; dragging=false; rail.classList.remove('dragging'); setTimeout(function(){ moved=false; },0); }
    rail.addEventListener('pointerup', end);
    rail.addEventListener('pointercancel', end);
    rail.addEventListener('click', function(e){ if(hasOverflow()&&moved){ e.stopPropagation(); e.preventDefault(); } }, true);
    window.addEventListener('resize', function(){ setTimeout(update,80); });
    update(); setTimeout(update,300);
  }

  // wire
  screen.addEventListener('click', function(){ open(entries[state.active]); });
  $('ft-cta').addEventListener('click', function(){ open(entries[state.active]); });
  if(calBtn) calBtn.addEventListener('click', toggleCal);
  if(bgSwitch) bgSwitch.addEventListener('click', function(){ switchBg(bgIndex + 1); });
  $('ft-cal-done').addEventListener('click', toggleCal);
  $('ft-reset').addEventListener('click', resetBox);
  calLayer.addEventListener('pointerdown', onCalDown);
  $('ft-media-close').addEventListener('click', function(){ if(state.playlistMode) closePlaylistMode(); else closeMedia(); });
  document.addEventListener('keydown', onKey);
  document.addEventListener('pointermove', uiMove, { passive:true });
  document.addEventListener('pointermove', onDocMove);
  document.addEventListener('pointerup', onDocUp);

  // mount
  buildRail();
  setupRailSlider();
  setupLeaves();
  renderInfo();
  switchBg(bgIndex);   // 背景画像・タイトルを同期（枠は共通）
  applyBox(); applyCalUI(); updateReadout(); styleAllRail(); projectorOn();
  // 開発用: ?cal=1 / #cal で位置調整を起動（通常UIには出さない）
  if(/[?&]cal=1\b/.test(location.search) || location.hash === '#cal'){ toggleCal(); }
})();
</script>
