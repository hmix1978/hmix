    document.body.classList.remove('ft-ui-idle');
    clearTimeout(idleT);
    if(!state.playlistMode || adminMode) return;   // 登録作業中(admin)は消さない
    idleT = setTimeout(function(){ if(state.playlistMode && !adminMode) document.body.classList.add('ft-ui-idle'); }, 3000);
  }
  document.addEventListener('pointermove', uiWake, { passive:true });
  document.addEventListener('pointerdown', uiWake, { passive:true });
  function renderPlaylist(i){
    var p=PLAYLISTS[i]; if(!p || p._hidden) return; plActive=i;
    var cards=document.querySelectorAll('#ft-pl-sel .plc');
    for(var k=0;k<cards.length;k++){ cards[k].classList.toggle('sel', cards[k].getAttribute('data-i')==String(i)); }
    var head=document.querySelector('#ft-pl-head h4'), sub=document.querySelector('#ft-pl-head p'), body=document.getElementById('ft-pl-body');
    if(plAudio){ try{ plAudio.pause(); }catch(_){} } plPlayingId=null;
    closeMedia();   // 前のYouTube/動画を破棄してクリーンに切替

    if(p.type==='youtube'){
      ytVidIds=[]; ytLastCur=-1;
      head.textContent='収録映像';
      sub.textContent='YouTubeに接続中…';
      if(!renderYTRows(p, Object.keys(p.titles||{}), 0, true)){
        body.innerHTML='<div class="pl-note">映像一覧を読み込み中…</div>';
      }
      playInScreen('yt', p.yt);   // 額縁内で再生 → ytSyncList が一覧を描画
    } else {
      var uc=document.getElementById('ft-used'); if(uc) uc.classList.remove('on');   // 楽曲型では左カード非表示
      head.textContent=p.name; sub.textContent=p.sub+' · '+p._tracks.length+'曲';
      media.style.display='block'; state.mediaOpen=true;
      mediaInner.innerHTML='<div id="ft-pl-art"><div><div class="big">♪</div><div class="nm">'+p.name+'</div><div class="np" id="ft-pl-np">▶ で試聴</div></div></div>';
      body.innerHTML='';
      p._tracks.slice(0,40).forEach(function(t, idx){
        var row=document.createElement('div'); row.className='pl-row'; row.setAttribute('data-id', t.id);
        var tags=allTags(t).slice(0,2).join(' / ');
        row.innerHTML=
          '<button class="pl-h'+(isFav(t.id)?' on':'')+'" title="お気に入り">'+(isFav(t.id)?'♥':'♡')+'</button>'+
          '<span class="pl-ix">'+(idx<9?'0':'')+(idx+1)+'</span>'+
          '<span class="pl-nm">'+t.title+'<small>'+tags+'</small></span>'+
          '<span class="pl-dur">'+fmtDur(t)+'</span>'+
          '<a class="pl-mini" href="/music/'+t.id+'.html">詳細→</a>'+
          '<button class="pl-mini play" type="button">▶</button>';
        row.querySelector('.pl-h').addEventListener('click', function(){ var on=toggleFavId(t.id); this.classList.toggle('on',on); this.textContent=on?'♥':'♡'; });
        row.querySelector('.play').addEventListener('click', function(){ previewTrack(t, row); });
        body.appendChild(row);
      });
    }
  }
  function clearPlayingRows(){ var r=document.querySelectorAll('#ft-pl-body .pl-row.playing'); for(var i=0;i<r.length;i++) r[i].classList.remove('playing'); }
  function previewTrack(t, row){
    if(!plAudio){ plAudio=new Audio(); plAudio.addEventListener('ended', function(){ clearPlayingRows(); plPlayingId=null; }); }
    var np=document.getElementById('ft-pl-np');
    if(plPlayingId===t.id && !plAudio.paused){ plAudio.pause(); clearPlayingRows(); plPlayingId=null; if(np) np.textContent='▶ で試聴'; return; }
    plAudio.src=t.mp3; var pr=plAudio.play(); if(pr&&pr.catch) pr.catch(function(){});
    plPlayingId=t.id; clearPlayingRows(); if(row) row.classList.add('playing'); if(np) np.textContent='♪ '+t.title;
  }

  // ===== この映像で使われている曲（左カード）＋ 秋山用 裏フォーム =====
  var USEDK='hmix.theater.usedTracks', adminMode=false, adminNow=0, adminTimer=0, ytLastCur=-1, ytNoEmbed={};
  function loadUsed(){ try{ return JSON.parse(localStorage.getItem(USEDK)||'{}'); }catch(_){ return {}; } }
  function saveUsed(m){ try{ localStorage.setItem(USEDK, JSON.stringify(m)); }catch(_){} }
  function baseUsed(vid){ var p=PLAYLISTS[plActive]; return (p&&p.tracks&&p.tracks[vid])?p.tracks[vid].slice():[]; }
  function usedFor(vid){ var m=loadUsed(); return m[vid]!=null ? m[vid] : baseUsed(vid); }
  function trackById(id){ var T=window.TRACKS||[]; for(var i=0;i<T.length;i++) if(String(T[i].id)===String(id)) return T[i]; return null; }
  function fmtSec(s){ s=Math.max(0,Math.floor(s||0)); var m=Math.floor(s/60),ss=s%60; return m+':'+(ss<10?'0':'')+ss; }
  // 現在の動画ID：playlistIndex 経由を最優先（切替直後も確実）。getVideoData はフォールバック
  function curVideoId(){
    try{ if(ytPlayer&&ytPlayer.getPlaylist&&ytPlayer.getPlaylistIndex){
      var ids=ytPlayer.getPlaylist()||[], idx=ytPlayer.getPlaylistIndex();
      if(ids.length && idx>=0 && ids[idx]) return ids[idx];
    } }catch(e){}
    try{ var d=ytPlayer&&ytPlayer.getVideoData&&ytPlayer.getVideoData(); return (d&&d.video_id)||null; }catch(e){ return null; }
  }
  // 次/前：nextVideo は既存iframeバインドだと不安定なため、確実に動く playVideoAt で送る
  function ytRel(delta){
    if(!ytPlayer||!ytPlayer.getPlaylist||!ytPlayer.playVideoAt) return;
    var ids; try{ ids=ytPlayer.getPlaylist()||[]; }catch(e){ return; }
    if(!ids.length) return;
    var idx=0; try{ idx=ytPlayer.getPlaylistIndex(); }catch(e){}
    if(idx<0) idx=0;
    try{ ytPlayer.playVideoAt((idx+delta+ids.length)%ids.length); }catch(e){}
  }
  function addUsed(vid, e){ if(!vid) return; var m=loadUsed(); if(m[vid]==null) m[vid]=baseUsed(vid); m[vid].push(e); saveUsed(m); renderUsed(vid); }
  function delUsed(vid, i){ var m=loadUsed(); if(m[vid]==null) m[vid]=baseUsed(vid); m[vid].splice(i,1); saveUsed(m); renderUsed(vid); }

  function renderUsed(vid){
    var card=document.getElementById('ft-used'); if(!card) return;
    var p=PLAYLISTS[plActive];
    if(!state.playlistMode || !p || p.type!=='youtube'){ card.classList.remove('on'); return; }
    var list=usedFor(vid)||[];
    if(!list.length && !adminMode){ card.classList.remove('on'); return; }
    card.classList.add('on'); card.classList.toggle('admin', adminMode);
    var d; try{ d=ytPlayer&&ytPlayer.getVideoData&&ytPlayer.getVideoData(); }catch(e){}
    var vt=(d&&d.title)||'';
    var h='<div class="uh">この映像で使われている曲<small>'+esc(vt)+'</small></div><div class="ubody">';
    if(!list.length) h+='<div class="u-empty">まだ登録がありません'+(adminMode?'（下で追加）':'')+'</div>';
    list.forEach(function(u,i){
      var t=(u.t!=null)?fmtSec(u.t):'';
      if(u.id){ var tr=trackById(u.id);
        h+='<div class="u-row"><span class="u-t">'+t+'</span><button class="u-h'+(isFav(u.id)?' on':'')+'" data-fav="'+u.id+'">'+(isFav(u.id)?'♥':'♡')+'</button><span class="u-nm">'+esc(tr?tr.title:u.id)+'</span><a class="u-mini" href="/music/'+u.id+'.html">詳細</a><button class="u-mini" data-play="'+u.id+'">▶</button>'+(adminMode?'<button class="u-mini" data-del="'+i+'">✕</button>':'')+'</div>';
      } else {
        h+='<div class="u-row"><span class="u-t">'+t+'</span><span class="u-nm">'+esc(u.name||'未公開曲')+'</span><span class="u-tag">未公開</span>'+(adminMode?'<button class="u-mini" data-del="'+i+'">✕</button>':'')+'</div>';
      }
    });
    h+='</div>';
    if(adminMode){
      h+='<div class="u-admin"><div class="lab">🔒 使用楽曲の登録（秋山用） · 現在 <span class="u-time" id="u-now">'+fmtSec(adminNow)+'</span></div>'+
         '<input class="u-search" id="u-search" placeholder="曲名を数文字入力 → 候補から選ぶ" autocomplete="off">'+
         '<div class="u-cands" id="u-cands"></div>'+
         '<div class="u-arow"><button class="u-btn" id="u-unrel">＋ 未公開曲</button><button class="u-btn gold" id="u-export">JSONをコピー</button></div></div>';
    }
    card.innerHTML=h; wireUsed(card, vid);
  }
  function wireUsed(card, vid){
    [].forEach.call(card.querySelectorAll('[data-fav]'), function(el){ el.addEventListener('click', function(){ var on=toggleFavId(el.getAttribute('data-fav')); el.classList.toggle('on',on); el.textContent=on?'♥':'♡'; }); });
    [].forEach.call(card.querySelectorAll('[data-play]'), function(el){ el.addEventListener('click', function(){ var t=trackById(el.getAttribute('data-play')); if(t) previewTrack(t, null); }); });
    [].forEach.call(card.querySelectorAll('[data-del]'), function(el){ el.addEventListener('click', function(){ delUsed(vid, +el.getAttribute('data-del')); }); });
    if(adminMode){
      var s=card.querySelector('#u-search'), box=card.querySelector('#u-cands');
      if(s){ s.addEventListener('input', function(){
        var q=(s.value||'').trim().toLowerCase(); if(!q){ box.innerHTML=''; return; }
        var T=window.TRACKS||[], r=[];
        for(var i=0;i<T.length && r.length<8;i++){ var t=T[i]; if((t.title&&t.title.toLowerCase().indexOf(q)>=0)||(t.title_en&&t.title_en.toLowerCase().indexOf(q)>=0)||String(t.id).toLowerCase()===q) r.push(t); }
        box.innerHTML=r.map(function(t){ return '<div class="u-cand" data-id="'+t.id+'">'+esc(t.title)+'<small>'+esc(t.title_en||'')+' · '+t.id+'</small></div>'; }).join('');
        [].forEach.call(box.querySelectorAll('.u-cand'), function(el){ el.addEventListener('click', function(){ addUsed(vid, {id:el.getAttribute('data-id'), t:Math.floor(adminNow||0)}); }); });
      }); }
      var un=card.querySelector('#u-unrel'); if(un) un.addEventListener('click', function(){ var nm=prompt('未公開曲の名前'); if(nm) addUsed(vid, {name:nm, unreleased:true, t:Math.floor(adminNow||0)}); });
      var ex=card.querySelector('#u-export'); if(ex) ex.addEventListener('click', function(){ var txt=JSON.stringify(loadUsed()); try{ navigator.clipboard.writeText(txt); ex.textContent='コピーしました ✓'; setTimeout(function(){ ex.textContent='JSONをコピー'; },1600); }catch(e){ prompt('コピーしてください', txt); } });
    }
  }
  function toggleAdmin(){
    adminMode=!adminMode;
    if(adminMode){ if(!adminTimer) adminTimer=setInterval(function(){ try{ if(ytPlayer&&ytPlayer.getCurrentTime){ adminNow=ytPlayer.getCurrentTime()||0; var n=document.getElementById('u-now'); if(n) n.textContent=fmtSec(adminNow); } }catch(e){} }, 500); document.body.classList.remove('ft-ui-idle'); }
    else { clearInterval(adminTimer); adminTimer=0; }
    renderUsed(curVideoId());
  }
  function showNoEmbed(){
    if(!media) return; var m=document.getElementById('ft-yt-msg');
    if(!m){ m=document.createElement('div'); m.id='ft-yt-msg';
      m.style.cssText='position:absolute; inset:0; z-index:4; display:grid; place-items:center; text-align:center; padding:0 8%; background:rgba(5,9,7,.86); color:rgba(238,240,234,.92); font-family:"Noto Sans JP",sans-serif; font-size:13px; line-height:1.8;';
      media.appendChild(m); }
    m.innerHTML='この映像は権利者の設定により<br>シアター内で再生できません。<br><span style="font-size:11px;color:rgba(206,222,206,.6);">次の映像へ移動します…</span>';
    m.style.display='grid';
  }
  function hideNoEmbed(){ var m=document.getElementById('ft-yt-msg'); if(m) m.style.display='none'; }

  function renderYTRows(p, ids, cur, pending){
    ids = ids || [];
    if(!ids.length) return false;
    var body=document.getElementById('ft-pl-body'); if(!body) return false;
    var head=document.querySelector('#ft-pl-head h4'), sub=document.querySelector('#ft-pl-head p');
    if(head) head.textContent='収録映像';
    if(sub) sub.textContent=ids.length+'本 · '+(pending?'YouTube接続中':'クリックで再生');
    if(ytVidIds.join(',')!==ids.join(',')){
      ytVidIds=ids.slice();
      body.innerHTML='';
      ids.forEach(function(vid, idx){
        var row=document.createElement('div'); row.className='pl-vrow'; row.setAttribute('data-vid', vid);
        row.innerHTML=
          '<div class="pl-vth"><img loading="lazy" src="https://i.ytimg.com/vi/'+vid+'/mqdefault.jpg" alt=""><span class="pl-vplay">▶</span></div>'+
          '<div class="pl-vmeta"><div class="pl-vix">MOVIE '+(idx<9?'0':'')+(idx+1)+'</div><div class="pl-vt">'+esc((p.titles&&p.titles[vid])||ytTitles[vid]||('映像 '+(idx+1)))+'</div></div>'+
          '<div class="pl-vnow">NOW</div>';
        row.addEventListener('click', function(){
          try{ if(ytPlayer&&ytPlayer.playVideoAt) ytPlayer.playVideoAt(idx); }catch(e){}
          markYTCurrent(idx); try{ renderUsed(vid); }catch(e){}
        });
        body.appendChild(row);
      });
    }
    markYTCurrent(cur);
    return true;
  }
  function markYTCurrent(cur){
    var rows=document.querySelectorAll('#ft-pl-body .pl-vrow');
    for(var i=0;i<rows.length;i++){
      var v=rows[i].getAttribute('data-vid');
      var p=PLAYLISTS[plActive], ttl=(p&&p.titles&&p.titles[v])||ytTitles[v];
      if(ttl){ var tEl=rows[i].querySelector('.pl-vt'); if(tEl) tEl.textContent=ttl; }
      rows[i].classList.toggle('noembed', !!ytNoEmbed[v]);
      var on=(i===cur); rows[i].classList.toggle('playing', on);
      if(on) try{ rows[i].scrollIntoView({block:'nearest'}); }catch(e){}
    }
  }

  // YouTube プレイリストの「収録映像セレクター」を右パネルに描画（API getPlaylist から）
  function ytSyncList(){
    if(!state.playlistMode) return;
    var p=PLAYLISTS[plActive]; if(!p || p.type!=='youtube') return;
    if(!ytPlayer || !ytPlayer.getPlaylist) return;
    var ids; try{ ids=ytPlayer.getPlaylist()||[]; }catch(e){ return; }
    if(!ids.length) return;
    var cur=0; try{ cur=ytPlayer.getPlaylistIndex(); }catch(e){}
    try{ var d=ytPlayer.getVideoData&&ytPlayer.getVideoData(); if(d&&d.video_id&&d.title) ytTitles[d.video_id]=d.title; }catch(e){}
    renderYTRows(p, ids, cur, false);
    if(cur!==ytLastCur){ ytLastCur=cur; try{ renderUsed(curVideoId()); }catch(e){} }
  }

  // wire
  screen.addEventListener('click', function(){ open(entries[state.active]); });
  $('ft-cta').addEventListener('click', function(){ open(entries[state.active]); });
  if(calBtn) calBtn.addEventListener('click', toggleCal);
  if(bgSwitch) bgSwitch.addEventListener('click', function(){ switchBg(bgIndex + 1); });
  $('ft-cal-done').addEventListener('click', toggleCal);
  $('ft-reset').addEventListener('click', resetBox);
  calLayer.addEventListener('pointerdown', onCalDown);
  $('ft-media-close').addEventListener('click', function(){ if(state.playlistMode) closePlaylistMode(); else closeMedia(); });
  document.addEventListener('keydown', onKey);
  document.addEventListener('pointermove', onDocMove);
  document.addEventListener('pointerup', onDocUp);

  // mount
  buildRail();
  renderInfo();
  switchBg(bgIndex);   // 背景画像・タイトルを同期（枠は共通）
  applyBox(); applyCalUI(); updateReadout(); styleAllRail(); projectorOn();
  // 開発用: ?cal=1 / #cal で位置調整を起動（通常UIには出さない）
  if(/[?&]cal=1\b/.test(location.search) || location.hash === '#cal'){ toggleCal(); }
})();
</script>
</body>
