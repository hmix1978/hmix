<script>
(function(){
  function rd(){ try{ return sessionStorage.getItem('hmix_lang') || localStorage.getItem('hmix_lang'); }catch(e){ return null; } }
  window.HMIX_LANG = (rd()==='en') ? 'en' : 'ja';
  function applyStatic(){
    var en = window.HMIX_LANG==='en';
    try{ document.documentElement.lang = en?'en':'ja'; }catch(e){}
    document.querySelectorAll('[data-en]').forEach(function(el){
      var ja=el.getAttribute('data-ja'); if(ja==null){ ja=el.textContent; el.setAttribute('data-ja',ja); }
      el.textContent = en ? el.getAttribute('data-en') : ja;
    });
    document.querySelectorAll('[data-en-aria]').forEach(function(el){
      var ja=el.getAttribute('data-ja-aria'); if(ja==null){ ja=el.getAttribute('aria-label')||''; el.setAttribute('data-ja-aria',ja); }
      el.setAttribute('aria-label', en ? el.getAttribute('data-en-aria') : ja);
    });
    var tg=document.getElementById('ft-lang-toggle'); if(tg) tg.textContent = en ? '日本語' : 'EN';
  }
  window.HMIX_applyStaticLang = applyStatic;
  window.HMIX_setLang = function(l){
    window.HMIX_LANG = (l==='en')?'en':'ja';
    try{ sessionStorage.setItem('hmix_lang', window.HMIX_LANG); localStorage.setItem('hmix_lang', window.HMIX_LANG); }catch(e){}
    applyStatic();
    try{ window.dispatchEvent(new CustomEvent('hmix:lang',{detail:{lang:window.HMIX_LANG}})); }catch(e){}
  };
  document.addEventListener('DOMContentLoaded', function(){
    applyStatic();
    var tg=document.getElementById('ft-lang-toggle');
    if(tg) tg.addEventListener('click', function(){ window.HMIX_setLang(window.HMIX_LANG==='en'?'ja':'en'); });
  });
})();
</script>

    bindUILeave(document.getElementById('ft-pl-panel'));   // 収録映像：離れたら即収納

  function openPlaylistMode(idx){
    buildPlaylistUI();
    state.playlistMode = true;
    document.body.classList.add('ft-pl-on');
    var b=(document.getElementById('ft-dock') || document.getElementById('ft-bottom')); if(b) b.style.display='none';
    document.getElementById('ft-pl').classList.add('on');
    renderPlaylist(idx||0);
    uiWake();
  }
  function closePlaylistMode(){
    state.playlistMode = false;
    document.body.classList.remove('ft-pl-on');
    if(plAudio){ try{ plAudio.pause(); }catch(_){} } plPlayingId=null;
    closeMedia();
    var p=document.getElementById('ft-pl'); if(p) p.classList.remove('on');
    var u=document.getElementById('ft-used'); if(u) u.classList.remove('on');
    var b=(document.getElementById('ft-dock') || document.getElementById('ft-bottom')); if(b) b.style.display='';
    clearTimeout(idleT); document.body.classList.remove('ft-ui-idle');
  }
  var idleT=0, EDGE_REVEAL=40, EDGE_BOTTOM=64;   // 画面の左右端/下端からこの幅だけがドロワー誘発ゾーン
  function uiWake(force){
    if(!state.playlistMode) return;
    document.body.classList.remove('ft-ui-idle');
    clearTimeout(idleT);
    if(adminMode) return;
    idleT = setTimeout(function(){
      if(state.playlistMode && !adminMode && !(plPlayingId && plAudio && !plAudio.paused)) document.body.classList.add('ft-ui-idle');
    }, 3000);
  }
  // カーソルがパネルから離れたら即収納（3秒待たない）。別のUIへ移った時だけ維持。
  function uiSleep(){
    if(!state.playlistMode || adminMode) return;
    clearTimeout(idleT);
    document.body.classList.add('ft-ui-idle');
  }
  function bindUILeave(el){
    if(!el) return;
    el.addEventListener('pointerleave', function(e){
      if(e.pointerType === 'touch') return;
      var to = e.relatedTarget;
      if(to && to.closest && to.closest('#ft-pl, #ft-used, .ft-edge-tab')) return; // 別UIへ移動中は維持
      uiSleep();
    }, { passive:true });
  }
  // ドロワー誘発は「画面の左右端ギリギリ」または「UI(パネル/タブ)上」だけ。
  // 中央＝映像/ネイティブ操作(全画面ボタン等)の上では出さず収納を維持する。
  function uiMove(ev){
    if(!state.playlistMode) return;
    if(adminMode){ uiWake(true); return; }
    var ct = ev && ev.currentTarget;
    if(ct && ct !== document && ct.nodeType === 1){ uiWake(true); return; }  // パネル/タブ上：出したまま延命
    if(!ev || ev.pointerType === 'touch') return;                            // タッチはタブのタップで対応
    var x = ev.clientX||0, y = ev.clientY||0;
    var w = window.innerWidth || document.documentElement.clientWidth || 0;
    var h = window.innerHeight || document.documentElement.clientHeight || 0;
    // 左右端＝サイドパネル誘発、下端＝下部ドック(再生リスト選択/閉じる)誘発。中央(映像/全画面ボタン)では出さない。
    if(x <= EDGE_REVEAL || x >= w - EDGE_REVEAL || y >= h - EDGE_BOTTOM) uiWake(true);
  }
  function bindUIHover(el){
    if(!el) return;
    el.addEventListener('pointermove', uiMove, { passive:true });
  }
  function renderPlaylist(i){
    var p=PLAYLISTS[i]; if(!p || p._hidden) return; plActive=i;
    var cards=document.querySelectorAll('#ft-pl-sel .plc');
    for(var k=0;k<cards.length;k++){ cards[k].classList.toggle('sel', cards[k].getAttribute('data-i')==String(i)); }
    var head=document.querySelector('#ft-pl-head h4'), sub=document.querySelector('#ft-pl-head p'), body=document.getElementById('ft-pl-body');
    if(plAudio){ try{ plAudio.pause(); }catch(_){} } plPlayingId=null;
    closeMedia();   // 前のYouTube/動画を破棄してクリーンに切替

    if(p.type==='youtube'){
      ytVidIds=[]; ytLastCur=-1; ytCurVid=null; ytErrStreak=0;
      head.textContent=L('収録映像','Videos');
      sub.textContent=L('YouTubeに接続中…','Connecting to YouTube…');
      if(!renderYTRows(p, Object.keys(p.titles||{}), 0, true)){
        body.innerHTML='<div class="pl-note">'+L('映像一覧を読み込み中…','Loading video list…')+'</div>';
      }
      playInScreen('yt', p.yt);   // 額縁内で再生 → ytSyncList が一覧を描画
    } else {
      var uc=document.getElementById('ft-used'); if(uc) uc.classList.remove('on');   // 楽曲型では左カード非表示
      head.textContent=EL(p,'name'); sub.textContent=EL(p,'sub')+' · '+L(p._tracks.length+'曲', p._tracks.length+' tracks');
      media.style.display='block'; state.mediaOpen=true;
      mediaInner.innerHTML='<div id="ft-pl-art"><div><div class="big">♪</div><div class="nm">'+EL(p,'name')+'</div><div class="np" id="ft-pl-np">'+L('▶ で試聴','▶ to preview')+'</div></div></div>';
      body.innerHTML='';
      p._tracks.slice(0,40).forEach(function(t, idx){
        var row=document.createElement('div'); row.className='pl-row'; row.setAttribute('data-id', t.id);
        var tags=allTags(t).slice(0,2).join(' / ');
        row.innerHTML=
          '<button class="pl-h'+(isFav(t.id)?' on':'')+'" title="'+L('お気に入り','Favorite')+'">'+(isFav(t.id)?'♥':'♡')+'</button>'+
          '<span class="pl-ix">'+(idx<9?'0':'')+(idx+1)+'</span>'+
          '<span class="pl-nm">'+t.title+'<small>'+tags+'</small></span>'+
          '<span class="pl-dur">'+fmtDur(t)+'</span>'+
          '<a class="pl-mini" href="/music/'+t.id+'.html">'+L('詳細→','Details →')+'</a>'+
          '<button class="pl-mini play" type="button">▶</button>';
        row.querySelector('.pl-h').addEventListener('click', function(){ var on=toggleFavId(t.id); this.classList.toggle('on',on); this.textContent=on?'♥':'♡'; });
        row.querySelector('.play').addEventListener('click', function(){ previewTrack(t, row); });
        body.appendChild(row);
      });
    }
  }
  function clearPlayingRows(){ var r=document.querySelectorAll('#ft-pl-body .pl-row.playing'); for(var i=0;i<r.length;i++) r[i].classList.remove('playing'); }
  var PLVOLK='hmix.theater.previewVol', plVol=0.8;
  try{ var pv=parseFloat(localStorage.getItem(PLVOLK)); if(isFinite(pv)) plVol=Math.max(0,Math.min(1,pv)); }catch(_){}
  function setPreviewVolume(v){
    plVol=Math.max(0,Math.min(1,Number(v)||0));
    try{ localStorage.setItem(PLVOLK, String(plVol)); }catch(_){}
    if(plAudio) plAudio.volume=plVol;
  }
  // 試聴ボタンの▶/■を再生状態に同期（使用曲カード＋トラック行）
  function updatePreviewIcons(){
    var on = !!(plPlayingId && plAudio && !plAudio.paused);
    [].forEach.call(document.querySelectorAll('#ft-used [data-play]'), function(b){
      var pl = on && String(b.getAttribute('data-play'))===String(plPlayingId);
      b.textContent = pl ? '■' : '▶'; b.classList.toggle('is-playing', !!pl);
      b.setAttribute('title', pl ? L('停止','Stop') : L('試聴','Preview'));
    });
    [].forEach.call(document.querySelectorAll('#ft-pl-body .pl-row'), function(r){
      var b=r.querySelector('.play'); if(!b) return;
      var pl = on && String(r.getAttribute('data-id'))===String(plPlayingId);
      b.textContent = pl ? '■' : '▶'; b.classList.toggle('is-playing', !!pl);
    });
  }
  function previewTrack(t, row){
    if(!plAudio){ plAudio=new Audio();
      plAudio.addEventListener('ended', function(){ clearPlayingRows(); plPlayingId=null; var np=document.getElementById('ft-pl-np'); if(np) np.textContent=L('▶ で試聴','▶ to preview'); updatePreviewIcons(); });
      plAudio.addEventListener('pause', updatePreviewIcons);
      plAudio.addEventListener('play', updatePreviewIcons);
    }
    var np=document.getElementById('ft-pl-np');
    if(plPlayingId===t.id && !plAudio.paused){ plAudio.pause(); clearPlayingRows(); plPlayingId=null; if(np) np.textContent=L('▶ で試聴','▶ to preview'); updatePreviewIcons(); return; }
    plAudio.src=t.mp3; plAudio.volume=plVol; var pr=plAudio.play(); if(pr&&pr.catch) pr.catch(function(){});
    plPlayingId=t.id; clearPlayingRows(); if(row) row.classList.add('playing'); if(np) np.textContent='♪ '+t.title; updatePreviewIcons();
  }

  // ===== この映像で使われている曲（左カード）＋ 秋山用 裏フォーム =====
  var USEDK='hmix.theater.usedTracks', adminMode=false, adminNow=0, adminTimer=0, ytLastCur=-1, ytNoEmbed={}, ytCurVid=null, ytErrStreak=0;
  function loadUsed(){ try{ return JSON.parse(localStorage.getItem(USEDK)||'{}'); }catch(_){ return {}; } }
  function saveUsed(m){ try{ localStorage.setItem(USEDK, JSON.stringify(m)); }catch(_){} }
  function baseUsed(vid){ return (WORKS_USED_TRACKS&&WORKS_USED_TRACKS[vid])?WORKS_USED_TRACKS[vid].slice():[]; }
  function usedFor(vid){ var m=loadUsed(); return m[vid]!=null ? m[vid] : baseUsed(vid); }
  function trackById(id){ var T=window.TRACKS||[]; for(var i=0;i<T.length;i++) if(String(T[i].id)===String(id)) return T[i]; return null; }
  function fmtSec(s){ s=Math.max(0,Math.floor(s||0)); var m=Math.floor(s/60),ss=s%60; return m+':'+(ss<10?'0':'')+ss; }
  function currentVideoTime(){
    try{
      if(ytPlayer && ytPlayer.getCurrentTime){
        var t = ytPlayer.getCurrentTime();
        if(isFinite(t)) return Math.max(0, Math.floor(t));
      }
    }catch(e){}
    return Math.max(0, Math.floor(adminNow||0));
  }
  function trackSearchText(t){
    return [
      t && t.id,
      t && t.title,
      t && t.title_en,
      t && t.subtitle,
      t && t.description,
      t && t.description_en
    ].join(' ').toLowerCase();
  }
  // 現在の動画ID：playlistIndex 経由を最優先（切替直後も確実）。getVideoData はフォールバック
  function curVideoId(){
    try{ if(ytPlayer&&ytPlayer.getPlaylist&&ytPlayer.getPlaylistIndex){
      var ids=ytPlayer.getPlaylist()||[], idx=ytPlayer.getPlaylistIndex();
      if(ids.length && idx>=0 && ids[idx]) return ids[idx];
    } }catch(e){}
    try{ var d=ytPlayer&&ytPlayer.getVideoData&&ytPlayer.getVideoData(); return (d&&d.video_id)||null; }catch(e){ return null; }
  }
  // 次/前：nextVideo は既存iframeバインドだと不安定なため、確実に動く playVideoAt で送る
  function ytRel(delta){
    if(!ytPlayer||!ytPlayer.getPlaylist||!ytPlayer.playVideoAt) return;
    var ids; try{ ids=ytPlayer.getPlaylist()||[]; }catch(e){ return; }
    if(!ids.length) return;
    var idx=0; try{ idx=ytPlayer.getPlaylistIndex(); }catch(e){}
    if(idx<0) idx=0;
    try{ ytPlayer.playVideoAt((idx+delta+ids.length)%ids.length); }catch(e){}
  }
  function addUsed(vid, e){ vid = vid || ytCurVid; if(!vid) return; var m=loadUsed(); if(m[vid]==null) m[vid]=baseUsed(vid); m[vid].push(e); saveUsed(m); renderUsed(vid); try{ refreshYTRowsUsedCount(); }catch(_){} }
  function delUsed(vid, i){ var m=loadUsed(); if(m[vid]==null) m[vid]=baseUsed(vid); m[vid].splice(i,1); saveUsed(m); renderUsed(vid); try{ refreshYTRowsUsedCount(); }catch(_){} }

  function renderUsed(vid){
    vid = vid || ytCurVid;
    var card=document.getElementById('ft-used'); if(!card) return;
    var p=PLAYLISTS[plActive];
    if(!state.playlistMode || !p || p.type!=='youtube'){ card.classList.remove('on'); document.body.classList.remove('ft-has-used'); return; }
    var list=usedFor(vid)||[];
    // 公開側では空カードを出さない。登録モードだけ、未登録動画の確認用に表示する。
    if(!list.length && !adminMode){ card.classList.remove('on'); card.innerHTML=''; document.body.classList.remove('ft-has-used'); return; }
    card.classList.add('on'); document.body.classList.add('ft-has-used'); card.classList.toggle('admin', adminMode);
    var d; try{ d=ytPlayer&&ytPlayer.getVideoData&&ytPlayer.getVideoData(); }catch(e){}
    var vt=(d&&d.title)||'';
    var h='<div class="uh">この映像で使われている曲<small>'+esc(vt)+'</small></div><div class="ubody">';
    if(!list.length) h+='<div class="u-empty">この映像にはまだ使用曲が登録されていません（下のフォームで追加）</div>';
    else h+='<div class="u-listen"><span>'+L('試聴音量','Preview volume')+'</span><input id="u-preview-vol" type="range" min="0" max="100" value="'+Math.round(plVol*100)+'" step="1" aria-label="'+L('使用曲の試聴音量','Preview volume for used tracks')+'"></div>';
    list.forEach(function(u,i){
      var t=(u.t!=null)?fmtSec(u.t):'';
      if(u.id){ var tr=trackById(u.id);
        h+='<div class="u-row"><span class="u-t">'+t+'</span><button class="u-h'+(isFav(u.id)?' on':'')+'" data-fav="'+u.id+'">'+(isFav(u.id)?'♥':'♡')+'</button><span class="u-nm">'+esc(tr?tr.title:u.id)+'</span><a class="u-mini" href="/music/'+u.id+'.html">詳細</a><button class="u-mini" data-play="'+u.id+'">▶</button>'+(adminMode?'<button class="u-mini" data-del="'+i+'">✕</button>':'')+'</div>';
      } else {
        h+='<div class="u-row"><span class="u-t">'+t+'</span><span class="u-nm">'+esc(u.name||'未公開曲')+'</span><span class="u-tag">未公開</span>'+(adminMode?'<button class="u-mini" data-del="'+i+'">✕</button>':'')+'</div>';
      }
    });
    h+='</div>';
    if(adminMode){
      h+='<div class="u-admin"><div class="lab">🔒 使用楽曲の登録（秋山用） · 現在 <span class="u-time" id="u-now">'+fmtSec(adminNow)+'</span></div>'+
         '<input class="u-search" id="u-search" placeholder="曲名を打つと候補が出ます" autocomplete="off">'+
         '<div class="u-cands" id="u-cands"></div>'+
         '<div class="u-arow"><button class="u-btn" id="u-unrel">＋ 未公開曲</button><button class="u-btn gold" id="u-export">JSONをコピー</button></div></div>';
    }
    card.innerHTML=h; wireUsed(card, vid); updatePreviewIcons();
  }
  function wireUsed(card, vid){
    [].forEach.call(card.querySelectorAll('[data-fav]'), function(el){ el.addEventListener('click', function(){ var on=toggleFavId(el.getAttribute('data-fav')); el.classList.toggle('on',on); el.textContent=on?'♥':'♡'; }); });
    [].forEach.call(card.querySelectorAll('[data-play]'), function(el){ el.addEventListener('click', function(){ var t=trackById(el.getAttribute('data-play')); if(t) previewTrack(t, null); }); });
    [].forEach.call(card.querySelectorAll('[data-del]'), function(el){ el.addEventListener('click', function(){ delUsed(vid, +el.getAttribute('data-del')); }); });
    var pv=card.querySelector('#u-preview-vol'); if(pv) pv.addEventListener('input', function(){ setPreviewVolume((+pv.value||0)/100); });
    if(adminMode){
      var s=card.querySelector('#u-search'), box=card.querySelector('#u-cands');
      if(s){ s.addEventListener('input', function(){
        var q=(s.value||'').trim().toLowerCase(); if(!q){ box.innerHTML=''; return; }
        var T=window.TRACKS||[], r=[];
        for(var i=0;i<T.length && r.length<8;i++){ var t=T[i]; if(trackSearchText(t).indexOf(q)>=0) r.push(t); }
        box.innerHTML=r.map(function(t){ return '<div class="u-cand" data-id="'+t.id+'">'+esc(t.title)+'<small>'+esc(t.title_en||'')+' · '+t.id+'</small></div>'; }).join('');
        [].forEach.call(box.querySelectorAll('.u-cand'), function(el){ el.addEventListener('click', function(){
          addUsed(vid, {id:el.getAttribute('data-id'), t:currentVideoTime()});
        }); });
      }); }
      var un=card.querySelector('#u-unrel'); if(un) un.addEventListener('click', function(){ var nm=prompt('未公開曲の名前'); if(nm) addUsed(vid, {name:nm, unreleased:true, t:currentVideoTime()}); });
      var ex=card.querySelector('#u-export'); if(ex) ex.addEventListener('click', function(){
        // WORKS_USED_TRACKS にそのまま貼れる形で書き出す
        var data=loadUsed();
        var body=JSON.stringify(data, null, 2);
        var txt='// WORKS_USED_TRACKS に貼り付け（' + Object.keys(data).length + '本分）\n' + body;
        try{ navigator.clipboard.writeText(txt); ex.textContent='コピーしました ✓'; setTimeout(function(){ ex.textContent='JSONをコピー'; },1600); }catch(e){ prompt('コピーしてください', txt); }
      });
    }
  }
  function toggleAdmin(){
    adminMode=!adminMode;
    if(adminMode){ if(!adminTimer) adminTimer=setInterval(function(){ try{ if(ytPlayer&&ytPlayer.getCurrentTime){ adminNow=ytPlayer.getCurrentTime()||0; var n=document.getElementById('u-now'); if(n) n.textContent=fmtSec(adminNow); } }catch(e){} }, 500); document.body.classList.remove('ft-ui-idle'); }
    else { clearInterval(adminTimer); adminTimer=0; }
    renderUsed(ytCurVid || curVideoId());
  }
  function showNoEmbed(){
    if(!media) return; var m=document.getElementById('ft-yt-msg');
    if(!m){ m=document.createElement('div'); m.id='ft-yt-msg';
      m.style.cssText='position:absolute; inset:0; z-index:4; display:grid; place-items:center; text-align:center; padding:0 8%; background:rgba(5,9,7,.86); color:rgba(238,240,234,.92); font-family:"Noto Sans JP",sans-serif; font-size:13px; line-height:1.8;';
      media.appendChild(m); }
    m.innerHTML=L('この映像は権利者の設定により<br>シアター内で再生できません。<br><span style="font-size:11px;color:rgba(206,222,206,.6);">次の映像へ移動します…</span>','This video cannot be played inside the theater<br>due to the rights holder\'s settings.<br><span style="font-size:11px;color:rgba(206,222,206,.6);">Moving to the next video…</span>');
    m.style.display='grid';
  }
  function showAllNoEmbed(){
    if(!media) return; var m=document.getElementById('ft-yt-msg');
    if(!m){ m=document.createElement('div'); m.id='ft-yt-msg';
      m.style.cssText='position:absolute; inset:0; z-index:4; display:grid; place-items:center; text-align:center; padding:0 8%; background:rgba(5,9,7,.86); color:rgba(238,240,234,.92); font-family:"Noto Sans JP",sans-serif; font-size:13px; line-height:1.8;';
      media.appendChild(m); }
    m.innerHTML=L('このプレイリストの映像は、現在すべて<br>シアター内で再生できません。<br><span style="font-size:11px;color:rgba(206,222,206,.6);">右の一覧から個別に開くか、YouTube で直接ご覧ください。</span>','None of the videos in this playlist can be played<br>inside the theater right now.<br><span style="font-size:11px;color:rgba(206,222,206,.6);">Open them individually from the list, or watch on YouTube.</span>');
    m.style.display='grid';
  }
  function hideNoEmbed(){ var m=document.getElementById('ft-yt-msg'); if(m) m.style.display='none'; }

  function renderYTRows(p, ids, cur, pending){
    ids = ids || [];
    if(!ids.length) return false;
    var body=document.getElementById('ft-pl-body'); if(!body) return false;
    var head=document.querySelector('#ft-pl-head h4'), sub=document.querySelector('#ft-pl-head p');
    if(head) head.textContent=L('収録映像','Videos');
    if(sub) sub.textContent=L(ids.length+'本 · '+(pending?'YouTube接続中':'クリックで再生'), ids.length+(ids.length===1?' video · ':' videos · ')+(pending?'Connecting to YouTube':'Click to play'));
    if(ytVidIds.join(',')!==ids.join(',')){
      ytVidIds=ids.slice();
      body.innerHTML='';
      ids.forEach(function(vid, idx){
        var row=document.createElement('div'); row.className='pl-vrow'; row.setAttribute('data-vid', vid);
        var used=(usedFor(vid)||[]).length;
        var badge=used?('<div class="pl-vused" data-used-badge>'+L('使用曲 '+used,used+' tracks used')+'</div>'):'<div class="pl-vused" data-used-badge style="display:none">'+L('使用曲','Tracks used')+'</div>';
        row.innerHTML=
          '<div class="pl-vth"><img loading="lazy" src="https://i.ytimg.com/vi/'+vid+'/mqdefault.jpg" alt=""><span class="pl-vplay">▶</span></div>'+
          '<div class="pl-vmeta"><div class="pl-vix">MOVIE '+(idx<9?'0':'')+(idx+1)+'</div><div class="pl-vt">'+esc((p.titles&&p.titles[vid])||ytTitles[vid]||L('映像 '+(idx+1),'Video '+(idx+1)))+'</div>'+badge+'</div>'+
          '<div class="pl-vnow">NOW</div>';
        row.addEventListener('click', function(){
          try{ if(ytPlayer&&ytPlayer.playVideoAt) ytPlayer.playVideoAt(idx); }catch(e){}
          ytCurVid=vid; markYTCurrent(idx); try{ renderUsed(vid); }catch(e){}
        });
        body.appendChild(row);
      });
    }
    refreshYTRowsUsedCount();
    markYTCurrent(cur);
    return true;
  }
  // 「使用曲N」バッジを最新化（登録・削除後に呼ぶ）
  function refreshYTRowsUsedCount(){
    var rows=document.querySelectorAll('#ft-pl-body .pl-vrow');
    for(var i=0;i<rows.length;i++){
      var v=rows[i].getAttribute('data-vid');
      var n=(usedFor(v)||[]).length;
      var b=rows[i].querySelector('[data-used-badge]');
      if(b){
        if(n){ b.textContent=L('使用曲 '+n, n+' tracks used'); b.style.display=''; }
        else  { b.style.display='none'; }
      }
    }
  }
  function markYTCurrent(cur){
    var rows=document.querySelectorAll('#ft-pl-body .pl-vrow');
    for(var i=0;i<rows.length;i++){
      var v=rows[i].getAttribute('data-vid');
      var p=PLAYLISTS[plActive], ttl=(p&&p.titles&&p.titles[v])||ytTitles[v];
      if(ttl){ var tEl=rows[i].querySelector('.pl-vt'); if(tEl) tEl.textContent=ttl; }
      rows[i].classList.toggle('noembed', !!ytNoEmbed[v]);
      var on=(i===cur); rows[i].classList.toggle('playing', on);
      if(on) try{ rows[i].scrollIntoView({block:'nearest'}); }catch(e){}
    }
  }

  // 全動画タイトルを取得（YouTube IFrame APIは現在曲のタイトルしか返さないため、
  // oEmbed=APIキー不要 で各動画IDのタイトルを補完。失敗時は noembed プロキシにフォールバック）
  var ytTitleTried={}, _titleRefreshT=null;
  function scheduleTitleRefresh(){
    clearTimeout(_titleRefreshT);
    _titleRefreshT=setTimeout(function(){
      try{ var cur=0; if(ytPlayer&&ytPlayer.getPlaylistIndex) cur=ytPlayer.getPlaylistIndex(); markYTCurrent(cur); }catch(e){}
    }, 150);
  }
  function fetchYTTitles(ids){
    if(!ids || !ids.length || !window.fetch) return;
    var p=PLAYLISTS[plActive];
    ids.forEach(function(id){
      if(!id || ytTitles[id] || (p&&p.titles&&p.titles[id]) || ytTitleTried[id]) return;
      ytTitleTried[id]=1;
      var w='https://www.youtube.com/watch?v='+id;
      fetch('https://www.youtube.com/oembed?format=json&url='+encodeURIComponent(w))
        .then(function(r){ if(!r.ok) throw 0; return r.json(); })
        .then(function(j){ if(j&&j.title){ ytTitles[id]=j.title; scheduleTitleRefresh(); } })
        .catch(function(){
          fetch('https://noembed.com/embed?url='+encodeURIComponent(w))
            .then(function(r){ return r.json(); })
            .then(function(j){ if(j&&j.title){ ytTitles[id]=j.title; scheduleTitleRefresh(); } })
            .catch(function(){});
        });
    });
  }

  // YouTube プレイリストの「収録映像セレクター」を右パネルに描画（API getPlaylist から）
  function ytSyncList(){
    if(!state.playlistMode) return;
    var p=PLAYLISTS[plActive]; if(!p || p.type!=='youtube') return;
    if(!ytPlayer || !ytPlayer.getPlaylist) return;
    var ids; try{ ids=ytPlayer.getPlaylist()||[]; }catch(e){ return; }
    if(!ids.length) return;
    var cur=0; try{ cur=ytPlayer.getPlaylistIndex(); }catch(e){}
    try{ var d=ytPlayer.getVideoData&&ytPlayer.getVideoData(); if(d&&d.video_id&&d.title) ytTitles[d.video_id]=d.title; }catch(e){}
    fetchYTTitles(ids);   // 全動画のタイトルを非同期取得→揃い次第 markYTCurrent で反映
    renderYTRows(p, ids, cur, false);
    ytCurVid = ids[cur] || ytCurVid;   // 権威ある現在動画ID（インデックス基準）。getVideoDataの遅延に依存しない
    if(cur!==ytLastCur){ ytLastCur=cur; try{ renderUsed(ytCurVid); }catch(e){} }
  }


  function setupLeaves(){
    if(!leafCanvas||!leafCtx) return;
    window.addEventListener('resize', function(){ setTimeout(resizeLeaves,80); });
    resizeLeaves();
    updateLeaves();
  }
  function leavesAllowed(){
    if(window.matchMedia && window.matchMedia('(max-width: 600px)').matches) return false;
    if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return false;
    var k = curKey();
    return k === 'forest' || k === 'ruins';
  }
  function resizeLeaves(){
    if(!leafCanvas||!leafCtx) return;
    var dpr = Math.min(window.devicePixelRatio||1,2);
    leafCanvas.width = Math.max(1, Math.floor(window.innerWidth*dpr));
    leafCanvas.height = Math.max(1, Math.floor(window.innerHeight*dpr));
    leafCanvas.style.width = window.innerWidth+'px';
    leafCanvas.style.height = window.innerHeight+'px';
    leafCtx.setTransform(dpr,0,0,dpr,0,0);
    seedLeaves();
  }
  function seedLeaves(){
    leaves = [];
    if(!leafCanvas||!leafCtx) return;
    var n = 13; // 実験ページの葉: 密度1相当
    for(var i=0;i<n;i++) leaves.push(makeLeaf(true));
  }
  function makeLeaf(fresh){
    var w=window.innerWidth, h=window.innerHeight;
    return {
      x: -60 + Math.random()*(w+120),
      y: fresh ? -h + Math.random()*(h*2) : -50,
      r: 3 + Math.random()*6,
      vx: -14 + Math.random()*42,   // 実験ページの葉: 速度100相当
      vy: 14 + Math.random()*28,
      rot: Math.random()*Math.PI*2,
      spin: -2 + Math.random()*4,
      seed: Math.random()*1000,
      alpha: .34 + Math.random()*.18
    };
  }
  function updateLeaves(){
    if(!leafCanvas||!leafCtx) return;
    leafActive = leavesAllowed();
    leafCanvas.style.display = leafActive ? 'block' : 'none';
    if(leafActive && !leafRAF){
      if(!leaves.length) seedLeaves();
      leafLast = 0;
      leafRAF = requestAnimationFrame(drawLeaves);
    }
  }
  function drawLeaf(p){
    leafCtx.save();
    leafCtx.translate(p.x,p.y);
    leafCtx.rotate(p.rot);
    leafCtx.globalAlpha = p.alpha;
    leafCtx.fillStyle = curKey() === 'ruins' ? 'rgba(199,216,121,.78)' : 'rgba(176,184,102,.72)';
    leafCtx.beginPath();
    leafCtx.ellipse(0,0,p.r*.55,p.r,0,0,Math.PI*2);
    leafCtx.fill();
    leafCtx.restore();
  }
  function drawLeaves(now){
    leafRAF = 0;
    if(!leafActive || !leafCanvas || !leafCtx) return;
    var dt = Math.min(40, now - (leafLast || now)) / 1000;
    leafLast = now;
    leafCtx.clearRect(0,0,window.innerWidth,window.innerHeight);
    for(var i=0;i<leaves.length;i++){
      var p = leaves[i];
      p.x += p.vx * dt + Math.sin(now*.001 + p.seed) * dt * 20;
      p.y += p.vy * dt;
      p.rot += p.spin * dt;
      if(p.y > window.innerHeight + 60 || p.x < -120 || p.x > window.innerWidth + 120) leaves[i] = p = makeLeaf(false);
      drawLeaf(p);
    }
    leafRAF = requestAnimationFrame(drawLeaves);
  }

  function setupRailSlider(){
    var wrap=$('ft-rail-wrap'), prev=$('ft-rail-prev'), next=$('ft-rail-next');
    if(!rail||!wrap) return;
    function firstItem(){ return rail.querySelector('.ft-prog'); }
    function thumbH(){ var f=firstItem(); var t=f&&f.firstElementChild; return t?t.offsetHeight:60; }
    function hasOverflow(){ return rail.scrollWidth>rail.clientWidth+2; }
    function update(){
      var max=rail.scrollWidth-rail.clientWidth-1;
      var overflow=hasOverflow();
      var canL=rail.scrollLeft>2, canR=rail.scrollLeft<max;
      var th=thumbH();
      if(prev){ prev.style.display=(overflow&&canL)?'grid':'none'; prev.style.top=(th/2+14)+'px'; }
      if(next){ next.style.display=(overflow&&canR)?'grid':'none'; next.style.top=(th/2+14)+'px'; }
      var m='';
      if(overflow){
        var L=canL?'transparent 0, #000 7%':'#000 0, #000 0';
        var R=canR?'#000 93%, transparent 100%':'#000 100%, #000 100%';
        m='linear-gradient(to right, '+L+', '+R+')';
      }
      rail.style.webkitMaskImage=m;
      rail.style.maskImage=m;
    }
    function clampTo(v){ return Math.max(0, Math.min(v, rail.scrollWidth-rail.clientWidth)); }
    var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function animateTo(target){
      target=clampTo(target);
      if(reduce){ rail.scrollLeft=target; update(); return; }
      var start=rail.scrollLeft, d=target-start, t0=performance.now(), dur=340;
      rail.classList.add('dragging');
      (function fr(now){
        var p=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-p,3);
        rail.scrollLeft=start+d*e;
        if(p<1) requestAnimationFrame(fr); else { rail.classList.remove('dragging'); update(); }
      })(performance.now());
    }
    function step(dir){
      var f=firstItem(); var w=f?f.offsetWidth:120;
      animateTo(rail.scrollLeft + dir*(w+14)*2);
    }
    if(prev) prev.addEventListener('click', function(e){ e.stopPropagation(); step(-1); });
    if(next) next.addEventListener('click', function(e){ e.stopPropagation(); step(1); });
    rail.addEventListener('scroll', update, { passive:true });
    rail.addEventListener('wheel', function(e){
      if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){ rail.scrollLeft+=e.deltaY; e.preventDefault(); }
    }, { passive:false });
    var dragging=false, moved=false, sx=0, sl=0, pid=null;
    rail.addEventListener('pointerdown', function(e){
      if(e.pointerType!=='mouse'||e.button!==0||!hasOverflow()) return;
      // ここでは capture を張らない。張るとカードの単純クリックまで飲み込まれ、選択できなくなる。
      // 実際にドラッグ開始(12px超)した時だけ capture＋スクロールに切り替える。
      dragging=true; moved=false; sx=e.clientX; sl=rail.scrollLeft; pid=e.pointerId;
    });
    rail.addEventListener('pointermove', function(e){
      if(!dragging) return;
      var dx=e.clientX-sx;
      if(!moved){
        if(Math.abs(dx)<=12) return;        // 閾値未満はクリック扱いのまま放置
        moved=true; rail.classList.add('dragging');
        if(rail.setPointerCapture) try{ rail.setPointerCapture(pid); }catch(_){}
      }
      rail.scrollLeft=sl-dx;
    });
    function end(){ if(!dragging) return; dragging=false; if(pid!=null&&rail.releasePointerCapture){ try{ rail.releasePointerCapture(pid); }catch(_){} } pid=null; rail.classList.remove('dragging'); setTimeout(function(){ moved=false; },0); }
    rail.addEventListener('pointerup', end);
    rail.addEventListener('pointercancel', end);
    rail.addEventListener('click', function(e){ if(hasOverflow()&&moved){ e.stopPropagation(); e.preventDefault(); } }, true);
    window.addEventListener('resize', function(){ setTimeout(update,80); });
    update(); setTimeout(update,300);
  }

  // wire
  screen.addEventListener('click', function(){ open(entries[state.active]); });
  $('ft-cta').addEventListener('click', function(){ open(entries[state.active]); });
  if(calBtn) calBtn.addEventListener('click', toggleCal);
  if(bgSwitch) bgSwitch.addEventListener('click', function(){ switchBg(bgIndex + 1); });
  $('ft-cal-done').addEventListener('click', toggleCal);
  $('ft-reset').addEventListener('click', resetBox);
  calLayer.addEventListener('pointerdown', onCalDown);
  $('ft-media-close').addEventListener('click', function(){ if(state.playlistMode) closePlaylistMode(); else closeMedia(); });
  document.addEventListener('keydown', onKey);
  document.addEventListener('pointermove', uiMove, { passive:true });
  document.addEventListener('pointermove', onDocMove);
  document.addEventListener('pointerup', onDocUp);

  // mount
  buildRail();
  setupRailSlider();
  setupLeaves();
  renderInfo();
  if(screenImg){ var _ie=entries[state.active]||entries[0]; if(_ie) screenImg.setAttribute('src', _ie.img); }  // 初期スクリーンを主役（旅する少女）に同期
  switchBg(bgIndex);   // 背景画像・タイトルを同期（枠は共通）
  applyBox(); applyCalUI(); updateReadout(); styleAllRail(); projectorOn();
  // 開発用: ?cal=1 / #cal で位置調整を起動（通常UIには出さない）
  if(/[?&]cal=1\b/.test(location.search) || location.hash === '#cal'){ toggleCal(); }
  // 言語切替に追従して動的UIを再描画
  window.addEventListener('hmix:lang', function(){
    try{
      buildRail(); styleAllRail(); renderInfo();
      var g=BGS[bgIndex]; if(bgName && g) bgName.textContent = EL(g,'title');
      if(state.playlistMode && typeof renderPlaylist==='function'){ renderPlaylist(plActive); }
    }catch(e){}
  });
})();
